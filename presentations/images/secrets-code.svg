  <rect x="20" y="30" width="660" height="10" fill="#161b22"/>
  <line x1="20" y1="40" x2="680" y2="40" stroke="#30363d" stroke-width="1"/>
  <circle cx="42" cy="25" r="5" fill="#ef4444"/>
  <circle cx="60" cy="25" r="5" fill="#f59e0b"/>
  <circle cx="78" cy="25" r="5" fill="#22c55e"/>
  <text x="110" y="29" fill="rgba(255,255,255,0.4)" font-size="10" font-family="monospace">config.js</text>

  <!-- Code content -->
  <text x="40" y="65" fill="rgba(255,255,255,0.5)" font-size="13" font-family="monospace"><tspan fill="#a78bfa">const</tspan> config = {</text>
  <text x="60" y="90" fill="rgba(255,255,255,0.5)" font-size="13" font-family="monospace">port: <tspan fill="#f59e0b">3000</tspan>,</text>

