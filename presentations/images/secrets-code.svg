  <rect x="30" y="127" width="3" height="24" rx="1" fill="#ef4444"/>
  <text x="60" y="145" fill="#ef4444" font-size="13" font-family="monospace">dbPass: <tspan fill="#ef4444">"prod_s3cur3!"</tspan></text>

  <text x="40" y="175" fill="rgba(255,255,255,0.5)" font-size="13" font-family="monospace">};</text>

  <text x="350" y="228" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">Your agent will do this. Every time.</text>
