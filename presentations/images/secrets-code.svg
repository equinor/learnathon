<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="Equinor, Helvetica, sans-serif">
  <!-- Window frame -->
  <rect x="20" y="10" width="660" height="190" rx="10" fill="#0d1117" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Title bar with dots -->
