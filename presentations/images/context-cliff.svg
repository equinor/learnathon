<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Equinor, Helvetica, sans-serif">
  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="80" y1="330" x2="650" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="25" y="190" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" transform="rotate(-90, 25, 190)">Context Quality</text>

  <!-- X axis label -->
  <text x="365" y="365" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Conversation Length</text>

  <!-- The curve: high quality, then cliff -->
  <path d="M 80 80 C 150 75, 250 70, 350 75 C 400 78, 430 80, 460 85 C 490 95, 510 120, 520 180 C 525 210, 528 260, 530 320"
        fill="none" stroke="#97CACE" stroke-width="3"/>

  <!-- Good zone shading -->
  <path d="M 80 80 C 150 75, 250 70, 350 75 C 400 78, 430 80, 460 85 L 460 330 L 80 330 Z"
        fill="rgba(0,112,121,0.12)"/>

  <!-- Danger zone shading -->
  <path d="M 460 85 C 490 95, 510 120, 520 180 C 525 210, 528 260, 530 320 L 650 320 L 650 85 Z"
        fill="rgba(235,0,55,0.08)"/>

  <!-- Cliff marker -->
  <line x1="460" y1="50" x2="460" y2="330" stroke="#eb0037" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="460" y="42" text-anchor="middle" fill="#eb0037" font-size="11" font-weight="600">⚠️ THE CLIFF</text>

  <!-- Annotations -->
  <rect x="130" y="110" width="190" height="50" rx="8" fill="#1a3a4a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="225" y="132" text-anchor="middle" fill="#40d38f" font-size="12" font-weight="600">✓ Agent remembers context</text>
  <text x="225" y="149" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">decisions, architecture, goals</text>

  <rect x="500" y="140" width="140" height="65" rx="8" fill="#1a3a4a" stroke="rgba(235,0,55,0.3)" stroke-width="1"/>
  <text x="570" y="160" text-anchor="middle" fill="#eb0037" font-size="11" font-weight="600">✗ Agent forgets</text>
  <text x="570" y="176" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">contradictions</text>
  <text x="570" y="192" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">repeated mistakes</text>

  <!-- Solution callout -->
  <rect x="200" y="240" width="250" height="70" rx="10" fill="#1a3a4a" stroke="#d97706" stroke-width="1.5"/>
  <text x="325" y="262" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">💡 Mitigation</text>
  <text x="325" y="280" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Commit often · Decisions in files</text>
  <text x="325" y="296" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Fresh chats for new tasks</text>
</svg>
