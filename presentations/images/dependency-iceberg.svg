<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Equinor, Helvetica, sans-serif">
  <!-- Labels -->
  <text x="350" y="25" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600" letter-spacing="1">WHAT YOU SEE</text>

  <!-- Above water: 3 packages as compact blocks -->
  <text x="330" y="42" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">3 direct dependencies</text>

  <rect x="130" y="50" width="120" height="60" rx="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="78" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">express</text>
  <text x="190" y="96" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">v4.18.2</text>

  <rect x="270" y="50" width="120" height="60" rx="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="330" y="78" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">dotenv</text>
  <text x="330" y="96" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">v16.3.1</text>

  <rect x="410" y="50" width="120" height="60" rx="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="470" y="78" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">cors</text>
  <text x="470" y="96" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">v2.8.5</text>

  <!-- Water line (blue) -->
  <line x1="40" y1="140" x2="660" y2="140" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="650" y="135" text-anchor="end" fill="#3b82f6" font-size="9" opacity="0.7">waterline</text>

  <!-- Below water label -->
  <text x="350" y="170" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600" letter-spacing="1">WHAT YOU DON'T SEE</text>

  <!-- Below water: iceberg shape (dashed red) -->
  <polygon points="210,190 490,190 560,360 140,360" fill="rgba(239,68,68,0.05)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Scattered transitive dep names -->
  <text x="260" y="220" fill="rgba(255,255,255,0.2)" font-size="9">qs@6.11.0</text>
  <text x="390" y="215" fill="rgba(255,255,255,0.2)" font-size="9">body-parser</text>
  <text x="310" y="248" fill="rgba(255,255,255,0.2)" font-size="9">mime-types</text>
  <text x="430" y="242" fill="rgba(255,255,255,0.2)" font-size="9">debug</text>
  <text x="240" y="275" fill="rgba(255,255,255,0.2)" font-size="9">send@0.18.0</text>
  <text x="360" y="278" fill="rgba(255,255,255,0.2)" font-size="9">depd</text>
  <text x="460" y="272" fill="rgba(255,255,255,0.2)" font-size="9">raw-body</text>
  <text x="280" y="305" fill="rgba(255,255,255,0.2)" font-size="9">bytes</text>
  <text x="390" y="310" fill="rgba(255,255,255,0.2)" font-size="9">iconv-lite</text>
  <text x="320" y="335" fill="rgba(255,255,255,0.2)" font-size="9">unpipe</text>
  <text x="430" y="330" fill="rgba(255,255,255,0.2)" font-size="9">ee-first</text>

  <!-- Stats -->
  <text x="350" y="355" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">200+ transitive dependencies</text>

  <text x="350" y="385" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Each one is code you trust implicitly but have never read.</text>
  <text x="350" y="405" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="9">704,102 malicious packages in 2024 (+156% YoY) · 50% of unprotected repos had cached malware — Sonatype</text>
</svg>
