<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Equinor, Helvetica, sans-serif">
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">"Skills are the recipe. MCP is the kitchen."</text>

  <!-- Divider -->
  <line x1="400" y1="60" x2="400" y2="430" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT: MCP = Kitchen -->
  <rect x="30" y="60" width="340" height="370" rx="16" fill="#1a3a4a" stroke="#007079" stroke-width="2"/>
  <text x="200" y="100" text-anchor="middle" fill="#007079" font-size="40">🔧</text>
  <text x="200" y="135" text-anchor="middle" fill="#fff" font-size="20" font-weight="600">MCP</text>
  <text x="200" y="158" text-anchor="middle" fill="#007079" font-size="13">The Kitchen</text>

  <!-- Kitchen items -->
  <rect x="60" y="180" width="280" height="44" rx="8" fill="rgba(0,112,121,0.15)" stroke="rgba(0,112,121,0.3)" stroke-width="1"/>
  <text x="80" y="207" fill="#97CACE" font-size="13">🔌  Connect to external systems</text>

  <rect x="60" y="234" width="280" height="44" rx="8" fill="rgba(0,112,121,0.15)" stroke="rgba(0,112,121,0.3)" stroke-width="1"/>
  <text x="80" y="261" fill="#97CACE" font-size="13">🛠️  Tool discovery &amp; execution</text>

  <rect x="60" y="288" width="280" height="44" rx="8" fill="rgba(0,112,121,0.15)" stroke="rgba(0,112,121,0.3)" stroke-width="1"/>
  <text x="80" y="315" fill="#97CACE" font-size="13">🔐  Authentication &amp; transport</text>

  <rect x="60" y="342" width="280" height="44" rx="8" fill="rgba(0,112,121,0.15)" stroke="rgba(0,112,121,0.3)" stroke-width="1"/>
  <text x="80" y="369" fill="#97CACE" font-size="13">📡  JSON-RPC protocol</text>

  <text x="200" y="412" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-style="italic">Infrastructure — the plumbing &amp; appliances</text>

  <!-- RIGHT: Skills = Recipe -->
  <rect x="430" y="60" width="340" height="370" rx="16" fill="#1a3a4a" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" fill="#d97706" font-size="40">📋</text>
  <text x="600" y="135" text-anchor="middle" fill="#fff" font-size="20" font-weight="600">SKILLS</text>
  <text x="600" y="158" text-anchor="middle" fill="#d97706" font-size="13">The Recipe</text>

  <!-- Recipe items -->
  <rect x="460" y="180" width="280" height="44" rx="8" fill="rgba(217,119,6,0.12)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>
  <text x="480" y="207" fill="#fbbf24" font-size="13">📝  Reusable instructions</text>

  <rect x="460" y="234" width="280" height="44" rx="8" fill="rgba(217,119,6,0.12)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>
  <text x="480" y="261" fill="#fbbf24" font-size="13">🗂️  SKILL.md files in your repo</text>

  <rect x="460" y="288" width="280" height="44" rx="8" fill="rgba(217,119,6,0.12)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>
  <text x="480" y="315" fill="#fbbf24" font-size="13">🔄  Progressive disclosure</text>

  <rect x="460" y="342" width="280" height="44" rx="8" fill="rgba(217,119,6,0.12)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>
  <text x="480" y="369" fill="#fbbf24" font-size="13">👥  Shareable across team</text>

  <text x="600" y="412" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-style="italic">Guidance — the what &amp; how</text>
</svg>
