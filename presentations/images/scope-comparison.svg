  <circle cx="185" cy="175" r="3" fill="#40d38f"/>
  <text x="170" y="170" fill="#40d38f" font-size="8" font-weight="600">form</text>
  <circle cx="215" cy="195" r="3" fill="#40d38f"/>
  <text x="223" y="192" fill="#40d38f" font-size="8" font-weight="600">save</text>
  <circle cx="195" cy="210" r="3" fill="#40d38f"/>
  <text x="175" y="222" fill="#40d38f" font-size="8" font-weight="600">confirm</text>

  <!-- Right: Agent's plan (bad) -->
  <rect x="420" y="20" width="350" height="210" rx="10" fill="rgba(235,0,55,0.05)" stroke="rgba(235,0,55,0.2)" stroke-width="1"/>
  <text x="440" y="48" fill="#eb0037" font-size="14" font-weight="700">&#x274C;  Agent's plan</text>

  <text x="455" y="75" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; Contact form with validation</text>
  <text x="455" y="95" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; User authentication + sessions</text>
  <text x="455" y="115" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; PostgreSQL database + ORM</text>
  <text x="455" y="135" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; Admin dashboard</text>
  <text x="455" y="155" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; Email notifications (SendGrid)</text>
  <text x="455" y="175" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; Rate limiting + monitoring</text>
  <text x="455" y="195" fill="rgba(255,255,255,0.5)" font-size="11">&#x2610; Logging (Winston + Sentry)</text>

  <text x="440" y="220" fill="rgba(255,255,255,0.35)" font-size="10">7 features · 12+ dependencies</text>

  <!-- Right: Your spec (good) -->
  <rect x="420" y="245" width="350" height="120" rx="10" fill="rgba(64,211,143,0.05)" stroke="rgba(64,211,143,0.3)" stroke-width="1"/>
  <text x="440" y="273" fill="#40d38f" font-size="14" font-weight="700">&#x2705;  Your spec</text>

  <text x="455" y="300" fill="#fff" font-size="11" font-weight="600">&#x2611; Contact form with validation</text>
  <text x="455" y="320" fill="#fff" font-size="11" font-weight="600">&#x2611; Submit to JSON file</text>
  <text x="455" y="340" fill="#fff" font-size="11" font-weight="600">&#x2611; Success confirmation page</text>

  <text x="440" y="358" fill="rgba(255,255,255,0.35)" font-size="10">3 features · 2 dependencies</text>

  <!-- Stat -->
  <rect x="420" y="380" width="350" height="30" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="595" y="400" text-anchor="middle" fill="#d97706" font-size="10" font-weight="600">Refactoring: 25% &#x2192; &lt;10%. Copy/paste code up 8x. — GitClear, 2025</text>
