  <!-- Nice-to-have blips -->
  <circle cx="155" cy="115" r="3.5" fill="rgba(217,119,6,0.6)"/>
  <text x="130" y="110" fill="rgba(217,119,6,0.7)" font-size="8" font-weight="600">auth</text>
  <circle cx="260" cy="135" r="3.5" fill="rgba(217,119,6,0.6)"/>
  <text x="268" y="132" fill="rgba(217,119,6,0.7)" font-size="8" font-weight="600">email</text>
