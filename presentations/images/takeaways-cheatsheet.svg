<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="Equinor, Helvetica, sans-serif">
  <!-- Card container -->
  <rect x="10" y="10" width="580" height="520" rx="14" fill="#1a3a4a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Purple gradient header -->
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="580" height="60" rx="14" fill="url(#headerGrad)"/>
  <rect x="10" y="50" width="580" height="20" fill="url(#headerGrad)"/>
  <text x="300" y="38" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">&#x1F6E1;&#xFE0F; Secure Vibe Coding Cheat Sheet</text>
  <text x="300" y="58" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">spec &#x2192; plan &#x2192; build &#x2192; verify &#x2192; secure &#x2192; ship</text>

  <!-- Spec card -->
  <rect x="25" y="85" width="270" height="95" rx="10" fill="rgba(34,197,94,0.08)"/>
  <text x="45" y="108" fill="#22c55e" font-size="14">&#x1F4CB;</text>
  <text x="63" y="108" fill="#22c55e" font-size="10" font-weight="700">SPEC</text>
  <text x="45" y="130" fill="#e2e8f0" font-size="12" font-weight="600">Security questions baked in</text>
  <text x="45" y="150" fill="rgba(255,255,255,0.45)" font-size="10">What data? What access? What input?</text>

  <!-- Plan card -->
  <rect x="305" y="85" width="270" height="95" rx="10" fill="rgba(34,197,94,0.08)"/>
  <text x="325" y="108" fill="#22c55e" font-size="14">&#x1F3AF;</text>
  <text x="343" y="108" fill="#22c55e" font-size="10" font-weight="700">PLAN</text>
  <text x="325" y="130" fill="#e2e8f0" font-size="12" font-weight="600">Min scope + limit permissions</text>
  <text x="325" y="150" fill="rgba(255,255,255,0.45)" font-size="10">Push back on bloat &amp; unnecessary deps</text>

  <!-- Build card -->
  <rect x="25" y="190" width="270" height="95" rx="10" fill="rgba(245,158,11,0.08)"/>
  <text x="45" y="213" fill="#f59e0b" font-size="14">&#x1F528;</text>
  <text x="63" y="213" fill="#f59e0b" font-size="10" font-weight="700">BUILD</text>
  <text x="45" y="235" fill="#e2e8f0" font-size="12" font-weight="600">Read before commit. Compact often.</text>
  <text x="45" y="255" fill="rgba(255,255,255,0.45)" font-size="10">Small commits = small blast radius</text>

  <!-- Verify card -->
  <rect x="305" y="190" width="270" height="95" rx="10" fill="rgba(245,158,11,0.08)"/>
  <text x="325" y="213" fill="#f59e0b" font-size="14">&#x2705;</text>
  <text x="343" y="213" fill="#f59e0b" font-size="10" font-weight="700">VERIFY</text>
  <text x="325" y="235" fill="#e2e8f0" font-size="12" font-weight="600">Run it yourself. Trust code, not claims.</text>
  <text x="325" y="255" fill="rgba(255,255,255,0.45)" font-size="10">Verify then trust &#x2014; never the reverse</text>

  <!-- Secure card (full width) -->
  <rect x="25" y="295" width="550" height="120" rx="10" fill="rgba(239,68,68,0.08)"/>
  <text x="45" y="318" fill="#ef4444" font-size="14">&#x1F512;</text>
  <text x="63" y="318" fill="#ef4444" font-size="10" font-weight="700">SECURE &#x2014; THE 5-MINUTE PULSE</text>

  <!-- Pulse keyword pills -->
  <rect x="45" y="332" width="120" height="26" rx="5" fill="rgba(239,68,68,0.12)"/>
  <text x="55" y="350" fill="#e2e8f0" font-size="10" font-weight="600">&#x1F511; Secrets?</text>

  <rect x="175" y="332" width="145" height="26" rx="5" fill="rgba(239,68,68,0.12)"/>
  <text x="185" y="350" fill="#e2e8f0" font-size="10" font-weight="600">&#x1F9F9; Unsanitised input?</text>

  <rect x="330" y="332" width="125" height="26" rx="5" fill="rgba(239,68,68,0.12)"/>
  <text x="340" y="350" fill="#e2e8f0" font-size="10" font-weight="600">&#x1F4E6; Packages?</text>

  <rect x="465" y="332" width="100" height="26" rx="5" fill="rgba(239,68,68,0.12)"/>
  <text x="475" y="350" fill="#e2e8f0" font-size="10" font-weight="600">&#x1F310; Ext. calls?</text>

  <text x="45" y="390" fill="rgba(255,255,255,0.45)" font-size="10">+ Right deps, not more deps &#x2014; use peer-reviewed libs for security-sensitive code</text>

  <!-- Ship card (full width) -->
  <rect x="25" y="425" width="550" height="42" rx="10" fill="rgba(124,58,237,0.1)"/>
  <text x="300" y="452" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">&#x1F680; Ship &#x2014; with your eyes open, not closed</text>

  <text x="300" y="500" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">Screenshot this.</text>
</svg>
