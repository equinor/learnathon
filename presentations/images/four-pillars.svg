<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Equinor, Helvetica, sans-serif">
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-size="20" font-weight="600">Context Engineering</text>
  <text x="400" y="62" text-anchor="middle" fill="#97CACE" font-size="13">Anthropic's four pillars</text>

  <!-- Pillar 1: Write -->
  <rect x="30" y="90" width="170" height="300" rx="12" fill="#1a3a4a" stroke="#97CACE" stroke-width="2"/>
  <text x="115" y="130" text-anchor="middle" fill="#97CACE" font-size="32">✍️</text>
  <text x="115" y="165" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">WRITE</text>
  <text x="115" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Create durable context</text>
  <line x1="65" y1="215" x2="165" y2="215" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="115" y="240" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">CLAUDE.md</text>
  <text x="115" y="258" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">AGENTS.md</text>
  <text x="115" y="276" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">mini-spec.md</text>
  <text x="115" y="294" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">copilot-instructions</text>
  <text x="115" y="330" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">"Write these first.</text>
  <text x="115" y="346" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">Code second."</text>

  <!-- Pillar 2: Select -->
  <rect x="220" y="90" width="170" height="300" rx="12" fill="#1a3a4a" stroke="#97CACE" stroke-width="2"/>
  <text x="305" y="130" text-anchor="middle" fill="#97CACE" font-size="32">🎯</text>
  <text x="305" y="165" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">SELECT</text>
  <text x="305" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Choose what goes in</text>
  <line x1="255" y1="215" x2="355" y2="215" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="305" y="240" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Right info for</text>
  <text x="305" y="258" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">the right task</text>
  <text x="305" y="288" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Don't dump everything</text>
  <text x="305" y="306" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">into context</text>
  <text x="305" y="340" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">"Relevant, not</text>
  <text x="305" y="356" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">exhaustive."</text>

  <!-- Pillar 3: Compress -->
  <rect x="410" y="90" width="170" height="300" rx="12" fill="#1a3a4a" stroke="#97CACE" stroke-width="2"/>
  <text x="495" y="130" text-anchor="middle" fill="#97CACE" font-size="32">🗜️</text>
  <text x="495" y="165" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">COMPRESS</text>
  <text x="495" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Keep context lean</text>
  <line x1="445" y1="215" x2="545" y2="215" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="495" y="240" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Summarise decisions</text>
  <text x="495" y="258" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Trim long histories</text>
  <text x="495" y="276" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Start fresh chats</text>
  <text x="495" y="340" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">"Less is more.</text>
  <text x="495" y="356" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">Dense is best."</text>

  <!-- Pillar 4: Isolate -->
  <rect x="600" y="90" width="170" height="300" rx="12" fill="#1a3a4a" stroke="#97CACE" stroke-width="2"/>
  <text x="685" y="130" text-anchor="middle" fill="#97CACE" font-size="32">📦</text>
  <text x="685" y="165" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">ISOLATE</text>
  <text x="685" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Split for focus</text>
  <line x1="635" y1="215" x2="735" y2="215" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="685" y="240" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">One task per chat</text>
  <text x="685" y="258" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Subagents for subtasks</text>
  <text x="685" y="276" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">Focused context wins</text>
  <text x="685" y="340" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">"Each task gets</text>
  <text x="685" y="356" text-anchor="middle" fill="#97CACE" font-size="10" font-style="italic">its own world."</text>
</svg>
