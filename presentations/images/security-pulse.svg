<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" font-family="Equinor, Helvetica, sans-serif">
  <rect x="20" y="20" width="460" height="380" rx="14" fill="#1a3a4a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="460" height="60" rx="14" fill="url(#pulseGrad)"/>
  <rect x="20" y="60" width="460" height="20" fill="url(#pulseGrad)"/>
  <text x="250" y="48" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">&#x23F1; 5-Minute Security Pulse</text>
  <text x="250" y="68" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Run after every build sprint</text>

  <!-- Item 1: Secrets -->
  <rect x="50" y="100" width="400" height="55" rx="8" fill="rgba(235,0,55,0.06)" stroke="rgba(235,0,55,0.3)" stroke-width="1.5"/>
  <text x="80" y="125" fill="#eb0037" font-size="15" font-weight="600">&#x1F511;  Hardcoded secrets?</text>
  <text x="80" y="143" fill="rgba(255,255,255,0.45)" font-size="10">API keys, tokens, passwords in source code</text>

  <!-- Item 2: Input -->
  <rect x="50" y="168" width="400" height="55" rx="8" fill="rgba(217,119,6,0.06)" stroke="rgba(217,119,6,0.3)" stroke-width="1.5"/>
  <text x="80" y="193" fill="#d97706" font-size="15" font-weight="600">&#x1F9F9;  Unsanitised input?</text>
  <text x="80" y="211" fill="rgba(255,255,255,0.45)" font-size="10">User data going straight into HTML, SQL, or commands</text>

  <!-- Item 3: Packages -->
  <rect x="50" y="236" width="400" height="55" rx="8" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
  <text x="80" y="261" fill="#a78bfa" font-size="15" font-weight="600">&#x1F4E6;  Unexplained packages?</text>
  <text x="80" y="279" fill="rgba(255,255,255,0.45)" font-size="10">Dependencies you didn't ask for or don't recognise</text>

  <!-- Item 4: External calls -->
  <rect x="50" y="304" width="400" height="55" rx="8" fill="rgba(151,202,206,0.06)" stroke="rgba(151,202,206,0.3)" stroke-width="1.5"/>
  <text x="80" y="329" fill="#97CACE" font-size="15" font-weight="600">&#x1F310;  Unintended external calls?</text>
  <text x="80" y="347" fill="rgba(255,255,255,0.45)" font-size="10">Fetch, curl, or API calls you didn't request</text>

  <text x="250" y="388" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">Screenshot this.</text>
</svg>
