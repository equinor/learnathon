<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="Equinor, Helvetica, sans-serif">
  <rect x="20" y="20" width="460" height="340" rx="14" fill="#1a3a4a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#97CACE"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="460" height="60" rx="14" fill="url(#pulseGrad)"/>
  <rect x="20" y="60" width="460" height="20" fill="url(#pulseGrad)"/>
  <text x="250" y="48" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">5-Minute Security Pulse</text>
  <text x="250" y="68" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Run after every build sprint</text>

  <rect x="50" y="100" width="400" height="45" rx="8" fill="rgba(235,0,55,0.06)" stroke="rgba(235,0,55,0.3)" stroke-width="1.5"/>
  <text x="80" y="128" fill="#eb0037" font-size="15" font-weight="600">&#x1F511;  Hardcoded secrets?</text>

  <rect x="50" y="158" width="400" height="45" rx="8" fill="rgba(217,119,6,0.06)" stroke="rgba(217,119,6,0.3)" stroke-width="1.5"/>
  <text x="80" y="186" fill="#d97706" font-size="15" font-weight="600">&#x1F9F9;  Unsanitised input?</text>

  <rect x="50" y="216" width="400" height="45" rx="8" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
  <text x="80" y="244" fill="#a78bfa" font-size="15" font-weight="600">&#x1F4E6;  Unexplained packages?</text>

  <rect x="50" y="274" width="400" height="45" rx="8" fill="rgba(151,202,206,0.06)" stroke="rgba(151,202,206,0.3)" stroke-width="1.5"/>
  <text x="80" y="302" fill="#97CACE" font-size="15" font-weight="600">&#x1F310;  Unintended external calls?</text>

  <text x="250" y="348" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">Screenshot this.</text>
</svg>
