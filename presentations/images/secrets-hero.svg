<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="Equinor, Helvetica, sans-serif">
  <text x="400" y="30" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="600" letter-spacing="2">PUBLIC GITHUB, 2025</text>
  <text x="400" y="105" text-anchor="middle" fill="#ef4444" font-size="72" font-weight="900" line-height="1">29M</text>
  <text x="400" y="140" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">new hardcoded secrets in a single year</text>

  <!-- Stat boxes (amber, matching mockup) -->
  <rect x="80" y="165" width="190" height="60" rx="8" fill="#1a3a4a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="175" y="195" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="800">+34%</text>
  <text x="175" y="214" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">YoY growth</text>

  <rect x="305" y="165" width="190" height="60" rx="8" fill="#1a3a4a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="800">+81%</text>
  <text x="400" y="214" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">AI-service secrets</text>

  <rect x="530" y="165" width="190" height="60" rx="8" fill="#1a3a4a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="195" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="800">70%</text>
  <text x="625" y="214" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9">still active 2yr later</text>

  <text x="400" y="242" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600">32.2% of internal repos contain at least one hardcoded secret</text>
  <a href="https://blog.gitguardian.com/the-state-of-secrets-sprawl-2026/" target="_blank"><text x="400" y="258" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="9" text-decoration="underline">GitGuardian State of Secrets Sprawl, 2025 + 2026 reports</text></a>
</svg>
