<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Equinor, Helvetica, sans-serif">
  <rect x="20" y="20" width="560" height="380" rx="14" fill="#1a3a4a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <text x="300" y="65" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">You asked for milk.</text>

  <text x="80" y="110" fill="#40d38f" font-size="15" font-weight="600">&#x2705;  Milk</text>
  <text x="370" y="110" fill="rgba(255,255,255,0.4)" font-size="11">&#8592; what you asked for</text>

  <text x="80" y="145" fill="rgba(255,255,255,0.6)" font-size="15">&#x1F35E;  Artisan bread</text>
  <text x="80" y="180" fill="rgba(255,255,255,0.6)" font-size="15">&#x1F9C8;  Organic butter</text>
  <text x="80" y="215" fill="rgba(255,255,255,0.6)" font-size="15">&#x2615;  Coffee machine</text>
  <text x="80" y="250" fill="rgba(255,255,255,0.6)" font-size="15">&#x1F373;  Cast iron pan</text>
  <text x="80" y="285" fill="rgba(255,255,255,0.6)" font-size="15">&#x1F4DA;  Cookbook collection</text>
  <text x="80" y="320" fill="rgba(255,255,255,0.6)" font-size="15">&#x1F3E0;  Kitchen renovation</text>

  <rect x="60" y="345" width="480" height="35" rx="6" fill="rgba(217,119,6,0.1)"/>
  <text x="300" y="368" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">Every item is more to review, more to secure, more to maintain.</text>
</svg>
