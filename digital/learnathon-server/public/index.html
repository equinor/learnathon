<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .subtitle { color: #555; font-size: 1.1rem; margin-bottom: 2.5rem; }
    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 500px;
    }
    a {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 1.25rem;
      text-decoration: none;
      color: #ccc;
      transition: border-color 0.2s, background 0.2s;
    }
    a:hover { border-color: #7c3aed; background: #1e1e34; }
    a.primary {
      border-color: #7c3aed;
      background: #1a1530;
    }
    a.primary:hover {
      background: #1e1e40;
      border-color: #a78bfa;
    }
    .link-title { font-size: 1.1rem; font-weight: 700; color: #a78bfa; margin-bottom: 0.3rem; }
    .link-desc { font-size: 0.8rem; color: #666; }
    .link-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .badge-primary {
      background: #7c3aed33;
      color: #a78bfa;
    }
    .badge-secondary {
      background: #1e1e30;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Learnathon 2026</h1>
  <p class="subtitle">EDC &mdash; March 18</p>
  <div class="links">
    <a href="/bingo/card.html">
      <div class="link-title">Bingo Card</div>
      <div class="link-desc">Mark squares for your team</div>
    </a>
    <a href="/bingo/dashboard.html" class="primary">
      <div class="link-title">Live Scoreboard <span class="link-badge badge-primary">Primary</span></div>
      <div class="link-desc">All teams, leaderboard &amp; live activity</div>
    </a>
    <a href="/bingo/wall.html">
      <div class="link-title">Team Cards <span class="link-badge badge-secondary">Projector</span></div>
      <div class="link-desc">Projector-friendly team cards view</div>
    </a>
    <a href="/voting/vote.html">
      <div class="link-title">Vote</div>
      <div class="link-desc">Cast your awards votes</div>
    </a>
    <a href="/voting/screen.html">
      <div class="link-title">Screen</div>
      <div class="link-desc">Big-screen reveal view</div>
    </a>
    <a href="/voting/admin.html">
      <div class="link-title">Voting Admin</div>
      <div class="link-desc">Facilitator controls</div>
    </a>
  </div>
</body>
</html>
