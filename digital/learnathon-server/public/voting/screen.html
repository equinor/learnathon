<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026 — Screen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Idle / pre-ceremony */
    #idle-screen {
      text-align: center;
    }

    #idle-screen .logo { font-size: 5rem; margin-bottom: 1rem; }

    #idle-screen h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #idle-screen p { color: #555; font-size: 1.4rem; margin-top: 1rem; }

    /* Voting open screen */
    #voting-screen {
      display: none;
      text-align: center;
    }

    #voting-screen .icon { font-size: 4rem; display: block; margin-bottom: 1rem; }

    #voting-screen h2 {
      font-size: 3rem;
      font-weight: 800;
      color: #4ade80;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #vote-count {
      font-size: 1.4rem;
      color: #555;
      margin-top: 1.5rem;
    }

    #vote-url-display {
      margin-top: 2rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #4ade80;
      background: #0a1f0a;
      border: 1px solid #15803d;
      padding: 0.6rem 1.5rem;
      border-radius: 12px;
      display: inline-block;
    }

    /* Reveal screen */
    #reveal-screen {
      display: none;
      text-align: center;
      width: 100%;
      padding: 2rem;
    }

    #reveal-emoji { font-size: 6rem; display: block; margin-bottom: 0.5rem; }

    #reveal-label {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    #reveal-subtitle {
      color: #555;
      font-size: 1.2rem;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }

    /* Results bars */
    #results {
      display: none;
      width: 100%;
      max-width: 900px;
      padding: 0 2rem;
      margin-top: 1rem;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    .result-team {
      font-size: 1.5rem;
      font-weight: 700;
      width: 200px;
      flex-shrink: 0;
      text-align: right;
    }

    .result-bar-wrap {
      flex: 1;
      background: #1a1a2e;
      border-radius: 8px;
      height: 48px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 8px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
    }

    .result-bar.winner {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
    }

    .result-count {
      font-size: 1.5rem;
      font-weight: 800;
      width: 50px;
      flex-shrink: 0;
      color: #a78bfa;
    }

    .result-row.winner .result-team { color: #fbbf24; }
    .result-row.winner .result-count { color: #fbbf24; }

    .tie-banner {
      background: #2d1a00;
      border: 2px solid #d97706;
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      margin-top: 1.2rem;
      font-size: 1.3rem;
      color: #fbbf24;
      animation: pulse 1.5s infinite;
    }

    .tie-banner .tie-icon { font-size: 1.5rem; margin-right: 0.5rem; }

    /* All done */
    #done-screen {
      display: none;
      text-align: center;
    }

    #done-screen .logo { font-size: 5rem; margin-bottom: 1rem; }

    #done-screen h2 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #done-screen p { color: #555; font-size: 1.4rem; margin-top: 1rem; }

    /* Progress dots */
    #category-dots {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
    }

    .cat-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #222;
      transition: background 0.3s;
    }

    .cat-dot.revealed { background: #7c3aed; }
    .cat-dot.current { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
  </style>
</head>
<body>

  <div id="idle-screen">
    <div class="logo">🎓</div>
    <h1>Learnathon 2026</h1>
    <p>Awards ceremony starting soon...</p>
  </div>

  <div id="voting-screen">
    <span class="icon">🗳️</span>
    <h2>VOTING IS OPEN</h2>
    <div id="vote-count"></div>
    <div id="vote-url-display"></div>
  </div>

  <div id="reveal-screen">
    <span id="reveal-emoji"></span>
    <div id="reveal-label"></div>
    <div id="reveal-subtitle"></div>
  </div>

  <div id="results"></div>

  <div id="done-screen">
    <div class="logo">🏆</div>
    <h2>Congratulations!</h2>
    <p>Thank you, Learnathon 2026</p>
  </div>

  <div id="category-dots"></div>

  <script>
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function hideAll() {
      ['idle-screen','voting-screen','reveal-screen','results','done-screen'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
    }

    function totalVotes(votes) {
      let total = 0;
      Object.values(votes).forEach(catVotes => {
        Object.values(catVotes).forEach(n => total += n);
      });
      return total;
    }

    function applyState(state) {
      hideAll();

      const allRevealed = state.revealedUpTo >= state.categories.length - 1;

      // Category progress dots
      document.getElementById('category-dots').innerHTML = state.categories.map((cat, i) => {
        const cls = i <= state.revealedUpTo ? 'revealed' :
                    i === state.revealedUpTo + 1 && !state.votingOpen && state.revealedUpTo >= 0 ? 'current' : '';
        return `<div class="cat-dot ${cls}" title="${cat.label}"></div>`;
      }).join('');

      // Voting is open
      if (state.votingOpen) {
        document.getElementById('voting-screen').style.display = 'block';
        const total = totalVotes(state.votes);
        document.getElementById('vote-count').textContent =
          total > 0 ? `${total} vote${total !== 1 ? 's' : ''} cast so far` : 'Waiting for votes...';
        document.getElementById('vote-url-display').textContent =
          `📱 ${window.location.origin}/voting/vote.html`;
        return;
      }

      // Nothing revealed yet, voting closed
      if (state.revealedUpTo < 0 && !state.votingOpen) {
        if (Object.keys(state.votes).length > 0) {
          // Votes exist but not revealed — suspense screen
          document.getElementById('reveal-screen').style.display = 'block';
          document.getElementById('reveal-emoji').textContent = '🥁';
          document.getElementById('reveal-label').textContent = 'Results are in...';
          document.getElementById('reveal-subtitle').textContent = '';
        } else {
          document.getElementById('idle-screen').style.display = 'block';
        }
        return;
      }

      // All revealed
      if (allRevealed) {
        // Show the last category's results, then switch to done after delay
        showReveal(state, state.revealedUpTo);
        return;
      }

      // Showing a revealed category
      if (state.revealedUpTo >= 0) {
        showReveal(state, state.revealedUpTo);
      }
    }

    function showReveal(state, index) {
      const cat = state.categories[index];
      const catVotes = state.votes[cat.id] || {};

      document.getElementById('reveal-screen').style.display = 'block';
      document.getElementById('reveal-emoji').textContent = cat.emoji;
      document.getElementById('reveal-label').textContent = cat.label;

      const categoryNum = index + 1;
      const total = state.categories.length;
      document.getElementById('reveal-subtitle').textContent =
        `Award ${categoryNum} of ${total}`;

      // Show results
      if (state.teams.length > 0) {
        const resultsEl = document.getElementById('results');
        resultsEl.style.display = 'block';

        const sorted = state.teams
          .map(team => ({ team, count: catVotes[team] || 0 }))
          .sort((a, b) => b.count - a.count);

        const maxVotes = sorted[0]?.count || 1;

        resultsEl.innerHTML = sorted.map((item, i) => `
          <div class="result-row ${i === 0 && item.count > 0 ? 'winner' : ''}">
            <div class="result-team">${escapeHtml(item.team)}</div>
            <div class="result-bar-wrap">
              <div class="result-bar ${i === 0 && item.count > 0 ? 'winner' : ''}"
                style="width: ${item.count === 0 ? '0' : Math.max(4, (item.count / maxVotes) * 100)}%">
              </div>
            </div>
            <div class="result-count">${item.count}</div>
          </div>
        `).join('');

        // Tie detection — prompt facilitator to check bingo cards
        const isTie = sorted.length >= 2 && sorted[0].count > 0 && sorted[0].count === sorted[1].count;
        if (isTie) {
          resultsEl.innerHTML += `
            <div class="tie-banner">
              <span class="tie-icon">⚖️</span>
              It's a tie! Check bingo card progress to decide the winner.
            </div>`;
        }
      }
    }

    const es = new EventSource('/voting/events');
    es.onmessage = e => applyState(JSON.parse(e.data));
    es.onerror = () => console.warn('SSE reconnecting...');
  </script>
</body>
</html>
