<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026 — Ceremony Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .login-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 32px 28px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h2 {
      font-size: 20px;
      font-weight: bold;
      color: #a78bfa;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
      margin-bottom: 14px;
    }

    .login-card input:focus {
      outline: none;
      border-color: #7c3aed;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-card button:hover { opacity: 0.88; }

    #login-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── App layout ── */
    #app {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 32px;
    }

    .app-header {
      margin-bottom: 20px;
    }

    .app-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }

    .app-header p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ── Phase banner ── */
    #phase-banner {
      padding: 12px 16px;
      border-left: 4px solid #7c3aed;
      border-radius: 8px;
      margin-bottom: 16px;
      background: #1a1a2e;
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
    }

    /* ── Timer section ── */
    #timer-section {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    #admin-timer {
      font-size: 48px;
      font-weight: bold;
      color: #7c3aed;
      font-variant-numeric: tabular-nums;
      text-align: center;
      line-height: 1;
      margin-bottom: 12px;
      min-height: 56px;
    }

    #admin-timer.paused {
      color: #64748b;
    }

    #admin-timer.warning {
      color: #ef4444;
    }

    #timer-controls {
      display: none;
      flex-direction: row;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    #timer-controls button {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2a2a3e;
      color: #e2e8f0;
      transition: opacity 0.15s;
    }

    #timer-controls button:hover { opacity: 0.8; }

    /* ── Actions ── */
    #actions {
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }

    .action-btn {
      display: none;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      transition: opacity 0.15s;
    }

    .action-btn:hover { opacity: 0.85; }

    .action-btn.primary { background: #7c3aed; }
    .action-btn.gold    { background: #d97706; }
    .action-btn.warning { background: #ef4444; }
    .action-btn.danger  { background: #dc2626; }
    .action-btn.ghost   { background: #2a2a3e; }

    /* ── Section card ── */
    .section {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 12px;
    }

    /* ── Queue list ── */
    .queue-item {
      padding: 8px 12px;
      border-radius: 6px;
      margin: 4px 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .queue-item.completed {
      opacity: 0.45;
    }

    .queue-item.current {
      background: rgba(124,58,237,0.18);
      border-left: 3px solid #7c3aed;
      color: #c4b5fd;
      font-weight: 600;
    }

    .queue-item.upcoming {
      color: #e2e8f0;
    }

    /* ── Vote counts ── */
    #vote-counts {
      font-size: 15px;
      color: #a78bfa;
      font-weight: 600;
    }

    /* ── Reveal list ── */
    .reveal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      margin: 3px 0;
      font-size: 14px;
      color: #64748b;
    }

    .reveal-item.revealed {
      color: #22c55e;
    }

    .reveal-item.current {
      color: #d97706;
      font-weight: bold;
      background: rgba(217,119,6,0.1);
      border-left: 3px solid #d97706;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      display: none;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    #toast.success { background: #22c55e; color: #000; }
    #toast.error   { background: #ef4444; }

    /* ── Spinner (SSE connecting) ── */
    #sse-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .spinner-sm {
      width: 16px;
      height: 16px;
      border: 2px solid #2a2a3e;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head><body>

  <!-- Login -->
  <div id="login">
    <div class="login-card">
      <h2>Ceremony Admin</h2>
      <input id="token-input" type="password" placeholder="Admin token" autocomplete="current-password">
      <button onclick="login()">Sign in</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app" style="display:none">

    <div class="app-header">
      <h1>Learnathon 2026 — Ceremony Admin</h1>
      <p>Facilitator control panel</p>
    </div>

    <div id="sse-loading" style="display:flex">
      <div class="spinner-sm"></div>
      Connecting to server...
    </div>

    <!-- Phase Banner (color-coded border) -->
    <div id="phase-banner"></div>

    <!-- Timer + Controls -->
    <div id="timer-section">
      <div id="admin-timer"></div>
      <div id="timer-controls">
        <button onclick="adminAction('pause')">⏸ Pause</button>
        <button onclick="adminAction('resume')">▶ Resume</button>
        <button onclick="adminAction('extend', {seconds:30})">+30s</button>
        <button onclick="adminAction('skip-phase')">⏭ Skip</button>
      </div>
    </div>

    <!-- Context-sensitive action buttons -->
    <div id="actions">
      <button id="btn-start" class="action-btn primary" onclick="adminAction('start-ceremony')">Start Ceremony</button>
      <button id="btn-next" class="action-btn primary" onclick="adminAction('next-team')">Next Team ▶</button>
      <button id="btn-reveal-start" class="action-btn gold" onclick="adminAction('start-reveal')">Start Reveal 🏆</button>
      <button id="btn-reveal-next" class="action-btn gold" onclick="adminAction('reveal-next')">Reveal Next ▶</button>
      <button id="btn-resolve-tie" class="action-btn warning" onclick="adminAction('resolve-tie')">Resolve Tie</button>
      <button id="btn-next-compliment" class="action-btn ghost" onclick="adminAction('next-complimenter')">Next Complimenter</button>
      <button id="btn-tiebreak-vote" class="action-btn warning" onclick="adminAction('start-tiebreak-vote')">Start Tiebreak Vote</button>
      <button id="btn-accept-tie" class="action-btn ghost" onclick="adminAction('accept-tie')">Accept Tie 🤝</button>
      <button id="btn-reset" class="action-btn danger" onclick="if(confirm('Reset everything?')) adminAction('reset')">Reset ⚠</button>
    </div>

    <!-- Queue List -->
    <div id="queue-section" class="section">
      <h3>Teams</h3>
      <div id="queue-list"></div>
    </div>

    <!-- Live Vote Count -->
    <div id="vote-count-section" class="section" style="display:none">
      <h3>Ratings</h3>
      <div id="vote-counts"></div>
    </div>

    <!-- Reveal Progress -->
    <div id="reveal-section" class="section" style="display:none">
      <h3>Awards</h3>
      <div id="reveal-list"></div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

  </div>

  <script>
    let token = '';
    let state = null;
    let timerInterval = null;

    // ── Login ──────────────────────────────────────────────────────────────

    function login() {
      const input = document.getElementById('token-input').value.trim();
      if (!input) { showLoginError('Enter an admin token'); return; }
      // Validate by calling an existing admin endpoint before proceeding
      fetch('/voting/admin/results', {
        headers: { 'x-admin-token': input }
      }).then(r => {
        if (!r.ok) throw new Error('Unauthorized');
        return r.json();
      }).then(() => {
        token = input;
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        connectSSE();
      }).catch(() => {
        showLoginError('Wrong token');
      });
    }

    function showLoginError(msg) {
      document.getElementById('login-error').textContent = msg;
    }

    document.getElementById('token-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    // ── SSE ────────────────────────────────────────────────────────────────

    function connectSSE() {
      const es = new EventSource(`/voting/admin/events?token=${encodeURIComponent(token)}`);
      es.onmessage = e => {
        document.getElementById('sse-loading').style.display = 'none';
        render(JSON.parse(e.data));
      };
      es.onerror = () => {
        // Reconnect silently; browser handles backoff
      };
    }

    // ── Admin actions ──────────────────────────────────────────────────────

    function adminAction(action, body) {
      return fetch(`/voting/admin/${action}`, {
        method: 'POST',
        headers: { 'x-admin-token': token, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      }).then(r => r.json()).then(data => {
        if (data.error) {
          showToast(data.error + (data.message ? ' — ' + data.message : ''), 'error');
        } else {
          showToast('OK', 'success');
        }
      }).catch(() => showToast('Network error', 'error'));
    }

    // ── Render ─────────────────────────────────────────────────────────────

    const REVEAL_ORDER = [
      'best-fail',
      'best-risk-catch',
      'best-safety',
      'most-creative',
      'best-creation',
      'peoples-choice',
      'overall',
    ];

    const PHASE_COLORS = {
      idle:        '#7c3aed',
      queue:       '#3b82f6',
      setup:       '#22c55e',
      presenting:  '#d97706',
      voting:      '#ef4444',
      reveal:      '#d97706',
      tiebreaker:  '#ef4444',
      done:        '#22c55e',
    };

    function render(s) {
      state = s;

      // ── Phase banner ───────────────────────────────────────
      const phaseColor = PHASE_COLORS[s.phase] || '#7c3aed';
      const banner = document.getElementById('phase-banner');
      banner.style.borderColor = phaseColor;
      const currentTeam = (s.currentIndex >= 0 && s.presentationOrder && s.teams)
        ? s.teams[s.presentationOrder[s.currentIndex]]
        : (s.currentTeam || '');
      const phaseLabel = s.phase ? s.phase.toUpperCase() : 'IDLE';
      banner.innerHTML = `<strong style="color:${phaseColor}">${phaseLabel}</strong>${currentTeam ? ' &mdash; ' + escapeHtml(currentTeam) : ''}`;

      // ── Button visibility ──────────────────────────────────
      function show(id, visible) {
        document.getElementById(id).style.display = visible ? 'inline-block' : 'none';
      }

      const order = s.presentationOrder || [];
      const completed = s.completed || [];
      const teamCount = s.teamCount || 0;

      show('btn-start', s.phase === 'idle');
      show('btn-next',  s.phase === 'queue' && s.currentIndex + 1 < order.length);
      show('btn-reveal-start',
        s.phase === 'queue' &&
        completed.length === teamCount &&
        teamCount > 0
      );
      show('btn-reveal-next', s.phase === 'reveal');
      show('btn-resolve-tie', s.phase === 'reveal' && s.currentReveal?.phase === 'finalists');
      show('btn-next-compliment',
        s.tiebreaker?.stage === 'bingo-check' || s.tiebreaker?.stage === 'compliment'
      );
      show('btn-tiebreak-vote', s.tiebreaker?.stage === 'compliment');
      show('btn-accept-tie', !!s.tiebreaker);
      show('btn-reset', true); // always available

      // Timer controls
      document.getElementById('timer-controls').style.display = s.timer ? 'flex' : 'none';

      // ── Queue list ─────────────────────────────────────────
      const queueEl = document.getElementById('queue-list');
      if (order.length > 0 && s.teams) {
        queueEl.innerHTML = order.map((teamIdx, pos) => {
          const team = s.teams[teamIdx];
          const isDone = completed.includes(team);
          const isCurrent = pos === s.currentIndex;
          const status = isDone ? '✓' : (isCurrent ? '▶' : String(pos + 1) + '.');
          const cls = isDone ? 'completed' : (isCurrent ? 'current' : 'upcoming');
          return `<div class="queue-item ${cls}">${escapeHtml(status + ' ' + team)}</div>`;
        }).join('');
      } else if (!order.length) {
        queueEl.innerHTML = '<div style="color:#64748b;font-size:13px;padding:8px 0">No teams configured</div>';
      }

      // ── Vote counts ────────────────────────────────────────
      const voteCountSection = document.getElementById('vote-count-section');
      if (s.phase === 'voting' && s.ratings) {
        const votingTeam = s.currentTeam || (s.teams && s.presentationOrder ? s.teams[s.presentationOrder[s.currentIndex]] : '');
        const teamRatings = (votingTeam && s.ratings[votingTeam]) || {};
        // Count unique voters: ratings[team][category][voter]
        const voterSet = new Set();
        for (const catRatings of Object.values(teamRatings)) {
          if (typeof catRatings === 'object') {
            Object.keys(catRatings).forEach(v => voterSet.add(v));
          }
        }
        document.getElementById('vote-counts').innerHTML =
          `<span style="font-size:28px;font-weight:bold;color:#a78bfa">${voterSet.size}</span>` +
          `<span style="color:#64748b;font-size:13px;margin-left:6px">voter${voterSet.size !== 1 ? 's' : ''} rated${votingTeam ? ' ' + escapeHtml(votingTeam) : ''}</span>`;
        voteCountSection.style.display = 'block';
      } else {
        voteCountSection.style.display = 'none';
      }

      // ── Reveal progress ────────────────────────────────────
      const revealSection = document.getElementById('reveal-section');
      const revealedAwards = s.revealedAwards || [];
      if (revealedAwards.length > 0 || s.phase === 'reveal' || s.phase === 'done') {
        document.getElementById('reveal-list').innerHTML = REVEAL_ORDER.map(id => {
          const revealed = revealedAwards.includes(id);
          const isCurrent = s.currentReveal?.awardId === id;
          const icon = revealed ? '✓' : (isCurrent ? '▶' : '○');
          const winner = isCurrent && s.currentReveal?.winner
            ? ` <span style="color:#fbbf24">&rarr; ${escapeHtml(s.currentReveal.winner)}</span>`
            : '';
          return `<div class="reveal-item ${revealed ? 'revealed' : ''} ${isCurrent ? 'current' : ''}">
            <span>${icon}</span>
            <span>${escapeHtml(id)}${winner}</span>
          </div>`;
        }).join('');
        revealSection.style.display = 'block';
      } else {
        revealSection.style.display = 'none';
      }
    }

    // ── Timer interval ─────────────────────────────────────────────────────

    timerInterval = setInterval(() => {
      const timerEl = document.getElementById('admin-timer');
      if (!state?.timer) {
        timerEl.textContent = '';
        return;
      }
      const t = state.timer;
      const rem = t.paused
        ? t.remaining
        : Math.max(0, Math.ceil((new Date(t.endsAt) - Date.now()) / 1000));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      timerEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
      timerEl.classList.toggle('paused', !!t.paused);
      timerEl.classList.toggle('warning', !t.paused && rem <= 30);
    }, 250);

    // ── Toast ──────────────────────────────────────────────────────────────

    let toastTimeout = null;

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = type || 'success';
      toast.style.display = 'block';
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // ── Utilities ──────────────────────────────────────────────────────────

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body></html>
