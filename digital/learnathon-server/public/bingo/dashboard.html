<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026 — Live Scoreboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header / Stats Bar */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #1a1a2e;
      background: #0a0a14;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header h1 {
      font-size: 0.85rem;
      font-weight: 800;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .header-accent {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 3px;
    }

    .header-stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .header-stat {
      text-align: center;
      min-width: 3rem;
    }

    .header-stat-value {
      font-size: 1rem;
      font-weight: 800;
      color: #a78bfa;
      line-height: 1;
    }

    .header-stat-value.amber { color: #d97706; }
    .header-stat-value.gold { color: #f59e0b; }

    .header-stat-label {
      font-size: 0.5rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-toggle {
      background: #1e1e30;
      border: 1px solid #333;
      color: #888;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .sidebar-toggle:hover {
      border-color: #7c3aed;
      color: #a78bfa;
    }

    .sidebar-toggle.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #fff;
    }

    /* Connection dot */
    .connection-dot {
      position: fixed;
      top: 12px;
      right: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      z-index: 50;
      transition: background 0.3s;
    }

    .connection-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
    }

    /* Connection banner */
    .connection-banner {
      display: none;
      text-align: center;
      padding: 0.4rem;
      background: #1a1520;
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 600;
      animation: connectPulse 1.5s ease-in-out infinite;
    }

    .connection-banner.visible { display: block; }

    @keyframes connectPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main layout */
    .main-layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Wall section (primary) */
    .wall-section {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      min-height: 0;
    }

    .wall-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .wall-title .count {
      background: #1e1e30;
      color: #a78bfa;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      font-size: 0.65rem;
    }

    /* Legends section */
    .legends-section {
      display: none;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #1a1a2e;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .legends-section.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes legendsEnter {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .legends-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
    }

    .legends-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }

    .legend-badge {
      background: linear-gradient(135deg, #92400e, #d97706);
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 800;
      animation: legendFloat 3s ease-in-out infinite;
    }

    @keyframes legendFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Bingo Cards Grid */
    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .mini-card {
      background: #111120;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 0.65rem;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }

    .mini-card.has-line { border-color: #d97706; }
    .mini-card.is-legend {
      border-color: #f59e0b;
      background: #1c1204;
      box-shadow: 0 0 16px #d9770633;
    }

    .mini-card-name {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ccc;
    }

    .mini-card.is-legend .mini-card-name { color: #fbbf24; }

    .mini-card-name.blink {
      animation: nameBlink 0.4s ease-in-out 6;
    }

    @keyframes nameBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .mini-sq {
      aspect-ratio: 1;
      border-radius: 2px;
      background: #1e1e30;
      transition: background 0.2s;
    }

    .mini-sq.marked { background: #5b21b6; }
    .mini-sq.in-line {
      background: #d97706;
      animation: squarePulse 0.6s ease-in-out 8;
    }
    .mini-sq.center { border: 1px solid #4c1d95; }
    .mini-sq.center.marked { background: #7c3aed; }
    .mini-sq.center.in-line { background: #f59e0b; }

    @keyframes squarePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .mini-lines {
      font-size: 0.6rem;
      color: #555;
      margin-top: 0.35rem;
      text-align: right;
    }

    .mini-lines.has-line { color: #d97706; font-weight: 700; }

    /* Sidebar */
    .sidebar {
      width: 320px;
      border-left: 1px solid #1a1a2e;
      display: flex;
      flex-direction: column;
      background: #0a0a14;
      transition: margin-right 0.3s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 0;
      border-left: none;
    }

    .sidebar-panel {
      flex: 1;
      padding: 0.75rem;
      overflow-y: auto;
      min-height: 0;
      border-bottom: 1px solid #1a1a2e;
    }

    .sidebar-panel:last-child { border-bottom: none; }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-title .count {
      background: #1e1e30;
      color: #a78bfa;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      font-size: 0.6rem;
    }

    /* Leaderboard */
    .leaderboard-list { list-style: none; }

    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.4rem;
      border-radius: 6px;
      margin-bottom: 0.2rem;
      font-size: 0.75rem;
    }

    .leaderboard-item:nth-child(-n+3) { background: #111120; }

    .lb-rank {
      width: 1.3rem;
      text-align: center;
      font-weight: 800;
      color: #555;
      font-size: 0.7rem;
    }

    .leaderboard-item:nth-child(1) .lb-rank { color: #f59e0b; }
    .leaderboard-item:nth-child(2) .lb-rank { color: #c0c0c0; }
    .leaderboard-item:nth-child(3) .lb-rank { color: #cd7f32; }

    .lb-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ccc;
    }

    .lb-legend .lb-name { color: #fbbf24; font-weight: 700; }

    .lb-stats {
      font-size: 0.6rem;
      color: #666;
      white-space: nowrap;
    }

    .lb-stats .lines { color: #d97706; font-weight: 700; }
    .lb-stats .legend-tag { color: #f59e0b; font-weight: 700; }

    /* Activity Feed */
    .activity-list { list-style: none; }

    .activity-item {
      padding: 0.25rem 0;
      border-bottom: 1px solid #111120;
      font-size: 0.7rem;
      color: #999;
      display: flex;
      gap: 0.4rem;
    }

    .activity-time {
      color: #555;
      font-size: 0.6rem;
      white-space: nowrap;
      min-width: 3rem;
    }

    .activity-text { flex: 1; }

    .activity-item.event-legend { color: #f59e0b; }
    .activity-item.event-line { color: #d97706; }
    .activity-item.event-mark { color: #a78bfa; }
    .activity-item.event-join { color: #22c55e; }

    /* Issues (Gotchas + Projects) */
    .tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .tab-btn {
      background: #1e1e30;
      border: 1px solid #222;
      color: #666;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #fff;
    }

    .tab-btn:hover:not(.active) {
      border-color: #444;
      color: #999;
    }

    .issue-card {
      background: #111120;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.4rem;
    }

    .issue-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #ccc;
      margin-bottom: 0.15rem;
    }

    .issue-meta {
      font-size: 0.6rem;
      color: #555;
    }

    .issue-body {
      font-size: 0.65rem;
      color: #888;
      margin-top: 0.25rem;
      line-height: 1.4;
      max-height: 2.5rem;
      overflow: hidden;
    }

    .no-issues {
      color: #444;
      font-size: 0.75rem;
      text-align: center;
      padding: 1rem 0;
    }

    /* Confetti & Fire Effects */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      opacity: 0;
      animation: confettiFall 3s ease-in forwards;
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    .legend-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 200;
      text-align: center;
      animation: legendPop 3s ease-out forwards;
      pointer-events: none;
    }

    .legend-toast .legend-name {
      font-size: 3rem;
      font-weight: 900;
      color: #f59e0b;
      text-shadow: 0 0 40px #f59e0b88, 0 0 80px #f59e0b44;
      white-space: nowrap;
    }

    .legend-toast .legend-subtitle {
      font-size: 1.2rem;
      color: #fbbf24;
      margin-top: 0.5rem;
    }

    .legend-toast .fire-ring {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    @keyframes legendPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1); }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    .line-toast {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: #1c1204;
      border: 2px solid #d97706;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      z-index: 150;
      animation: toastSlide 3s ease-out forwards;
      pointer-events: none;
      font-size: 0.9rem;
      color: #fbbf24;
      font-weight: 700;
    }

    @keyframes toastSlide {
      0% { transform: translateX(120%); opacity: 0; }
      10% { transform: translateX(0); opacity: 1; }
      80% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    /* --- Idle State --- */
    .idle-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .idle-screen.visible {
      display: flex;
    }

    .idle-bg-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .idle-content {
      position: relative;
      z-index: 1;
    }

    .idle-title {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed, #3b82f6, #a78bfa, #7c3aed);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: idleGradient 4s ease-in-out infinite, idlePulse 3s ease-in-out infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes idleGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes idlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .idle-url {
      font-size: 1.3rem;
      color: #a78bfa;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 0.02em;
      margin-top: 1rem;
    }

    .idle-url-label {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .idle-squares {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 600px;
    }

    .idle-square-label {
      background: #111120;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      color: #666;
      opacity: 0;
      animation: idleSquareFloat 8s ease-in-out infinite;
    }

    @keyframes idleSquareFloat {
      0% { opacity: 0; transform: translateY(8px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }

    /* Mobile layout */
    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid #1a1a2e;
        max-height: 40vh;
      }

      .sidebar.collapsed {
        width: 100%;
        max-height: 0;
        border-top: none;
      }

      .bingo-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }

      .header {
        flex-direction: column;
        align-items: stretch;
        gap: 0.4rem;
      }

      .header-left {
        justify-content: center;
      }

      .header-stats {
        justify-content: center;
      }

      .idle-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="connection-dot" id="connection-dot"></div>
  <div class="connection-banner" id="connection-banner">Connecting to live feed...</div>

  <div class="header">
    <div class="header-left">
      <h1>Learnathon 2026</h1>
      <div class="header-accent"></div>
    </div>
    <div class="header-stats">
      <div class="header-stat"><div class="header-stat-value" id="stat-teams">0</div><div class="header-stat-label">Teams</div></div>
      <div class="header-stat"><div class="header-stat-value" id="stat-squares">0</div><div class="header-stat-label">Squares</div></div>
      <div class="header-stat"><div class="header-stat-value amber" id="stat-lines">0</div><div class="header-stat-label">Lines</div></div>
      <div class="header-stat"><div class="header-stat-value gold" id="stat-legends">0</div><div class="header-stat-label">Legends</div></div>
      <div class="header-stat"><div class="header-stat-value" id="stat-popular">-</div><div class="header-stat-label">Most popular</div></div>
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">Activity &amp; Feed</button>
    </div>
  </div>

  <!-- Idle screen -->
  <div class="idle-screen" id="idle-screen">
    <canvas class="idle-bg-canvas" id="idle-canvas"></canvas>
    <div class="idle-content">
      <div class="idle-title">Learnathon 2026</div>
      <div class="idle-url-label">Join at</div>
      <div class="idle-url" id="idle-url"></div>
      <div class="idle-squares" id="idle-squares"></div>
    </div>
  </div>

  <!-- Main content (wall + sidebar) -->
  <div class="main-layout" id="main-layout" style="display:none;">
    <!-- Wall: primary hero section -->
    <div class="wall-section">
      <div class="legends-section" id="legends-section">
        <div class="legends-title">LEARNATHON LEGENDS</div>
        <div class="legends-list" id="legends-list"></div>
      </div>

      <div class="wall-title">Team Cards <span class="count" id="cards-count">0</span></div>
      <div class="bingo-grid" id="bingo-grid"></div>
    </div>

    <!-- Collapsible sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-panel">
        <div class="panel-title">Leaderboard</div>
        <ol class="leaderboard-list" id="leaderboard"></ol>
      </div>
      <div class="sidebar-panel">
        <div class="panel-title">Activity Feed</div>
        <ul class="activity-list" id="activity-feed"></ul>
      </div>
      <div class="sidebar-panel">
        <div class="panel-title">Community</div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="gotcha">Gotchas</button>
          <button class="tab-btn" data-tab="project">Projects</button>
        </div>
        <div id="issues-content"></div>
      </div>
    </div>
  </div>

  <script>
    const LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let prevTeams = {};
    let squareDefs = [];
    let activityLog = [];
    let legends = new Set();
    let legendsShown = false;
    const MAX_ACTIVITY = 100;
    let sidebarOpen = true;

    // --- Idle screen ---
    document.getElementById('idle-url').textContent = window.location.origin + '/bingo/card.html';

    // Idle canvas particles
    const idleCanvas = document.getElementById('idle-canvas');
    const idleCtx = idleCanvas.getContext('2d');
    let idleParticles = [];
    let idleAnimFrame = null;

    function resizeIdleCanvas() {
      idleCanvas.width = idleCanvas.parentElement.offsetWidth;
      idleCanvas.height = idleCanvas.parentElement.offsetHeight;
    }

    function initIdleParticles() {
      resizeIdleCanvas();
      idleParticles = [];
      const count = 50;
      for (let i = 0; i < count; i++) {
        idleParticles.push({
          x: Math.random() * idleCanvas.width,
          y: Math.random() * idleCanvas.height,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 2 + 1,
          color: ['#7c3aed', '#a78bfa', '#3b82f6', '#d97706'][Math.floor(Math.random() * 4)],
          alpha: Math.random() * 0.3 + 0.1,
        });
      }
      if (!idleAnimFrame) animateIdle();
    }

    function animateIdle() {
      if (!document.getElementById('idle-screen').classList.contains('visible')) {
        idleAnimFrame = null;
        return;
      }
      idleCtx.clearRect(0, 0, idleCanvas.width, idleCanvas.height);
      idleParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = idleCanvas.width;
        if (p.x > idleCanvas.width) p.x = 0;
        if (p.y < 0) p.y = idleCanvas.height;
        if (p.y > idleCanvas.height) p.y = 0;
        idleCtx.beginPath();
        idleCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        idleCtx.fillStyle = p.color;
        idleCtx.globalAlpha = p.alpha;
        idleCtx.fill();
      });
      // Draw faint connecting lines between nearby particles
      idleCtx.globalAlpha = 0.04;
      idleCtx.strokeStyle = '#a78bfa';
      for (let i = 0; i < idleParticles.length; i++) {
        for (let j = i + 1; j < idleParticles.length; j++) {
          const dx = idleParticles[i].x - idleParticles[j].x;
          const dy = idleParticles[i].y - idleParticles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            idleCtx.beginPath();
            idleCtx.moveTo(idleParticles[i].x, idleParticles[i].y);
            idleCtx.lineTo(idleParticles[j].x, idleParticles[j].y);
            idleCtx.stroke();
          }
        }
      }
      idleCtx.globalAlpha = 1;
      idleAnimFrame = requestAnimationFrame(animateIdle);
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('idle-screen').classList.contains('visible')) {
        resizeIdleCanvas();
      }
    });

    function showIdleSquareLabels(squares) {
      const container = document.getElementById('idle-squares');
      if (!squares || squares.length === 0) return;
      container.innerHTML = squares.map((sq, i) =>
        `<span class="idle-square-label" style="animation-delay:${(i * 0.6).toFixed(1)}s">${escapeHtml(sq.label)}</span>`
      ).join('');
    }

    // Show idle initially, then start particles
    document.getElementById('idle-screen').classList.add('visible');
    document.getElementById('connection-banner').classList.add('visible');
    initIdleParticles();

    // --- Sidebar toggle ---
    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
      document.getElementById('sidebar-toggle').classList.toggle('active', sidebarOpen);
    }

    // --- SSE ---
    const dot = document.getElementById('connection-dot');
    const banner = document.getElementById('connection-banner');
    const es = new EventSource('/bingo/events');

    es.onopen = () => {
      dot.classList.add('connected');
      banner.classList.remove('visible');
    };

    es.onmessage = e => {
      dot.classList.add('connected');
      banner.classList.remove('visible');
      const state = JSON.parse(e.data);
      squareDefs = state.squares;
      showIdleSquareLabels(state.squares);
      detectActivity(state.teams);
      prevTeams = JSON.parse(JSON.stringify(state.teams));

      const teamCount = Object.keys(state.teams).length;
      if (teamCount === 0) {
        document.getElementById('idle-screen').classList.add('visible');
        document.getElementById('main-layout').style.display = 'none';
        if (!idleAnimFrame) initIdleParticles();
      } else {
        document.getElementById('idle-screen').classList.remove('visible');
        document.getElementById('main-layout').style.display = 'flex';
      }

      renderCards(state.teams, state.squares);
      renderLeaderboard(state.teams);
      renderStats(state.teams, state.squares);
      renderLegends(state.teams);
    };

    es.onerror = () => {
      dot.classList.remove('connected');
      banner.classList.add('visible');
    };

    // --- Confetti & Fire Effects ---
    function spawnConfetti(colors) {
      const container = document.createElement('div');
      container.className = 'confetti-container';
      document.body.appendChild(container);

      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.animationDelay = `${Math.random() * 1.5}s`;
        piece.style.animationDuration = `${2 + Math.random() * 2}s`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = `${6 + Math.random() * 8}px`;
        piece.style.height = `${6 + Math.random() * 8}px`;
        container.appendChild(piece);
      }

      setTimeout(() => container.remove(), 5000);
    }

    function showLineToast(teamName, lineCount) {
      const toast = document.createElement('div');
      toast.className = 'line-toast';
      toast.innerHTML = `🎯 ${escapeHtml(teamName)} — ${lineCount} line${lineCount > 1 ? 's' : ''}!`;
      document.body.appendChild(toast);
      spawnConfetti(['#d97706', '#f59e0b', '#fbbf24', '#7c3aed', '#a78bfa']);
      setTimeout(() => toast.remove(), 3500);
    }

    function showLegendToast(teamName) {
      const toast = document.createElement('div');
      toast.className = 'legend-toast';
      toast.innerHTML = `
        <span class="fire-ring">🔥🔥🔥</span>
        <div class="legend-name">${escapeHtml(teamName)}</div>
        <div class="legend-subtitle">⭐ LEGEND STATUS ⭐</div>
        <span class="fire-ring">🔥🔥🔥</span>
      `;
      document.body.appendChild(toast);
      spawnConfetti(['#f59e0b', '#ef4444', '#fbbf24', '#ff6b35', '#ffcc00']);
      setTimeout(() => spawnConfetti(['#f59e0b', '#ef4444', '#fbbf24', '#ff6b35', '#ffcc00']), 800);
      setTimeout(() => toast.remove(), 3500);
    }

    // --- Activity detection ---
    function getCompletedLines(squares) {
      return LINES.filter(line => line.every(i => squares[i]));
    }

    function detectActivity(teams) {
      const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      for (const [name, team] of Object.entries(teams)) {
        const prev = prevTeams[name];

        if (!prev) {
          addActivity(now, `${escapeHtml(name)} joined the game`, 'join');
          continue;
        }

        for (let i = 0; i < 9; i++) {
          if (team.squares[i] && !prev.squares[i]) {
            const label = squareDefs[i]?.label || `Square ${i}`;
            addActivity(now, `${escapeHtml(name)} marked "${escapeHtml(label)}"`, 'mark');
          }
        }

        const prevLines = getCompletedLines(prev.squares).length;
        const currLines = getCompletedLines(team.squares).length;
        if (currLines > prevLines) {
          addActivity(now, `🎯 ${escapeHtml(name)} completed a line! (${currLines} total)`, 'line');
          showLineToast(name, currLines);
        }

        if (team.isLegend && !prev.isLegend) {
          addActivity(now, `🔥 ${escapeHtml(name)} became a LEGEND! 🔥`, 'legend');
          showLegendToast(name);
        }
      }
    }

    function addActivity(time, text, type) {
      activityLog.unshift({ time, text, type });
      if (activityLog.length > MAX_ACTIVITY) activityLog.length = MAX_ACTIVITY;
      renderActivityFeed();
    }

    function renderActivityFeed() {
      const el = document.getElementById('activity-feed');
      el.innerHTML = activityLog.map(a =>
        `<li class="activity-item event-${a.type}">
          <span class="activity-time">${a.time}</span>
          <span class="activity-text">${a.text}</span>
        </li>`
      ).join('');
    }

    // --- Legends ---
    function renderLegends(teams) {
      const teamList = Object.values(teams);
      teamList.forEach(team => {
        if (team.isLegend) legends.add(team.name);
      });

      const legendsSection = document.getElementById('legends-section');
      if (legends.size > 0) {
        if (!legendsShown) {
          legendsShown = true;
          legendsSection.style.display = 'block';
          void legendsSection.offsetWidth;
          legendsSection.style.animation = 'legendsEnter 0.5s ease forwards';
          legendsSection.classList.add('visible');
        }
        document.getElementById('legends-list').innerHTML =
          [...legends].map(name => `<div class="legend-badge">${escapeHtml(name)}</div>`).join('');
      }
    }

    // --- Bingo Cards ---
    function renderCards(teams, squares) {
      const teamList = Object.values(teams);
      document.getElementById('cards-count').textContent = teamList.length;

      const sorted = teamList.sort((a, b) => {
        if (a.isLegend !== b.isLegend) return b.isLegend - a.isLegend;
        const aLines = getCompletedLines(a.squares).length;
        const bLines = getCompletedLines(b.squares).length;
        if (aLines !== bLines) return bLines - aLines;
        return b.squares.filter(Boolean).length - a.squares.filter(Boolean).length;
      });

      document.getElementById('bingo-grid').innerHTML = sorted.map(team => {
        const completedLines = getCompletedLines(team.squares);
        const inLineSquares = new Set(completedLines.flat());

        const miniSquares = squares.map((sq, i) => {
          const classes = [
            'mini-sq',
            sq.center ? 'center' : '',
            team.squares[i] ? 'marked' : '',
            inLineSquares.has(i) ? 'in-line' : '',
          ].filter(Boolean).join(' ');
          return `<div class="${classes}"></div>`;
        }).join('');

        const lineCount = completedLines.length;
        return `
          <div class="mini-card ${lineCount > 0 ? 'has-line' : ''} ${team.isLegend ? 'is-legend' : ''}"
               id="card-${CSS.escape(team.name)}">
            <div class="mini-card-name" id="name-${CSS.escape(team.name)}" title="${escapeHtml(team.name)}">
              ${team.isLegend ? '\ud83d\udd25 ' : ''}${escapeHtml(team.name)}
            </div>
            <div class="mini-grid">${miniSquares}</div>
            <div class="mini-lines ${lineCount > 0 ? 'has-line' : ''}">
              ${lineCount > 0 ? `${lineCount} line${lineCount > 1 ? 's' : ''}` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function blinkTeamName(name) {
      const el = document.getElementById(`name-${CSS.escape(name)}`);
      if (!el) return;
      el.classList.remove('blink');
      void el.offsetWidth;
      el.classList.add('blink');
    }

    // --- Leaderboard ---
    function renderLeaderboard(teams) {
      const teamList = Object.values(teams);
      const sorted = teamList.sort((a, b) => {
        if (a.isLegend !== b.isLegend) return b.isLegend - a.isLegend;
        const aLines = getCompletedLines(a.squares).length;
        const bLines = getCompletedLines(b.squares).length;
        if (aLines !== bLines) return bLines - aLines;
        return b.squares.filter(Boolean).length - a.squares.filter(Boolean).length;
      });

      document.getElementById('leaderboard').innerHTML = sorted.map((team, i) => {
        const lines = getCompletedLines(team.squares).length;
        const marked = team.squares.filter(Boolean).length;
        let stats = `${marked}/9`;
        if (lines > 0) stats += ` <span class="lines">${lines} line${lines > 1 ? 's' : ''}</span>`;
        if (team.isLegend) stats += ` <span class="legend-tag">LEGEND</span>`;

        return `
          <li class="leaderboard-item ${team.isLegend ? 'lb-legend' : ''}">
            <span class="lb-rank">${i + 1}</span>
            <span class="lb-name">${escapeHtml(team.name)}</span>
            <span class="lb-stats">${stats}</span>
          </li>
        `;
      }).join('');
    }

    // --- Stats ---
    function renderStats(teams, squares) {
      const teamList = Object.values(teams);
      const totalTeams = teamList.length;
      const totalSquares = teamList.reduce((sum, t) => sum + t.squares.filter(Boolean).length, 0);
      const totalLines = teamList.reduce((sum, t) => sum + getCompletedLines(t.squares).length, 0);
      const totalLegends = teamList.filter(t => t.isLegend).length;

      document.getElementById('stat-teams').textContent = totalTeams;
      document.getElementById('stat-squares').textContent = totalSquares;
      document.getElementById('stat-lines').textContent = totalLines;
      document.getElementById('stat-legends').textContent = totalLegends;

      if (totalTeams > 0 && squares.length > 0) {
        const counts = squares.map((_, i) => teamList.filter(t => t.squares[i]).length);
        const maxCount = Math.max(...counts);
        const mostIdx = counts.indexOf(maxCount);
        const mostLabel = squares[mostIdx]?.label || '';
        document.getElementById('stat-popular').textContent = truncate(mostLabel, 14);
        document.getElementById('stat-popular').title = mostLabel;
      }
    }

    function truncate(str, max) {
      return str.length > max ? str.slice(0, max - 1) + '\u2026' : str;
    }

    // --- Issues ---
    let activeTab = 'gotcha';
    let issuesData = { gotcha: [], project: [] };

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        renderIssues();
      });
    });

    function renderIssues() {
      const issues = issuesData[activeTab];
      const el = document.getElementById('issues-content');

      if (issues.length === 0) {
        el.innerHTML = `<div class="no-issues">No ${activeTab === 'gotcha' ? 'gotchas' : 'projects'} submitted yet</div>`;
        return;
      }

      el.innerHTML = issues.map(issue => {
        const ago = timeAgo(new Date(issue.created_at));
        const bodyPreview = (issue.body || '').replace(/[#*_`\-\[\]]/g, '').trim().slice(0, 120);
        return `
          <div class="issue-card">
            <div class="issue-title">${escapeHtml(issue.title)}</div>
            <div class="issue-meta">by ${escapeHtml(issue.user || 'unknown')} &middot; ${ago}</div>
            ${bodyPreview ? `<div class="issue-body">${escapeHtml(bodyPreview)}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function timeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours}h ago`;
    }

    async function fetchIssues() {
      for (const label of ['gotcha', 'project']) {
        try {
          const res = await fetch(`/bingo/api/issues?label=${label}`);
          if (res.ok) {
            issuesData[label] = await res.json();
          }
        } catch {
          // Silently ignore
        }
      }
      renderIssues();
    }

    fetchIssues();
    setInterval(fetchIssues, 30_000);
  </script>
</body>
</html>
