<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon Bingo — Team Cards (Projector)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070f;
      color: #fff;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* Title area */
    .title-area {
      text-align: center;
      margin-bottom: 1.5rem;
      position: relative;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .title-accent {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 3px;
      margin: 0 auto 0.6rem;
    }

    /* Team count badge */
    #team-count {
      display: none;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.05em;
    }

    #team-count.visible { display: block; }

    /* Connection indicator */
    .connection-dot {
      position: fixed;
      top: 12px;
      right: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      z-index: 50;
      transition: background 0.3s;
    }

    .connection-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
    }

    /* Connection banner */
    .connection-banner {
      display: none;
      text-align: center;
      padding: 0.4rem;
      background: #1a1520;
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 600;
      animation: connectPulse 1.5s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    .connection-banner.visible { display: block; }

    @keyframes connectPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Legends section */
    #legends-section {
      display: none;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #1a1a2e;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #legends-section.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes legendsEnter {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #legends-title {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }

    #legends-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      justify-content: center;
    }

    .legend-badge {
      background: linear-gradient(135deg, #92400e, #d97706);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      animation: legendFloat 3s ease-in-out infinite;
    }

    @keyframes legendFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Team grid */
    #team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }

    /* Mini card */
    .mini-card {
      background: #111120;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 0.85rem;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    }

    .mini-card.has-line {
      border-color: #d97706;
    }

    .mini-card.is-legend {
      border-color: #f59e0b;
      background: #1c1204;
      box-shadow: 0 0 20px #d9770644;
    }

    .mini-card-name {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ccc;
    }

    .mini-card.is-legend .mini-card-name {
      color: #fbbf24;
    }

    .mini-card-name.blink {
      animation: nameBlink 0.4s ease-in-out 6;
    }

    @keyframes nameBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    /* Mini bingo grid */
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .mini-sq {
      aspect-ratio: 1;
      border-radius: 3px;
      background: #1e1e30;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .mini-sq.marked {
      background: #5b21b6;
    }

    .mini-sq.in-line {
      background: #d97706;
      animation: squarePulse 0.6s ease-in-out 8;
    }

    .mini-sq.center { border: 1px solid #4c1d95; }
    .mini-sq.center.marked { background: #7c3aed; }
    .mini-sq.center.in-line { background: #f59e0b; }

    @keyframes squarePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .mini-lines {
      font-size: 0.65rem;
      color: #555;
      margin-top: 0.4rem;
      text-align: right;
    }

    .mini-lines.has-line { color: #d97706; font-weight: 700; }

    /* --- Idle State --- */
    #idle {
      display: none;
      text-align: center;
      margin-top: 3rem;
      position: relative;
    }

    #idle.visible { display: block; }

    .idle-title {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed, #3b82f6, #a78bfa, #7c3aed);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: idleGradient 4s ease-in-out infinite, idleTitlePulse 3s ease-in-out infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes idleGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes idleTitlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    #idle-url {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #a78bfa;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 0.02em;
    }

    #idle-url-label {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .idle-squares {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .idle-square-label {
      background: #111120;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      color: #666;
      opacity: 0;
      animation: idleSquareFloat 8s ease-in-out infinite;
    }

    @keyframes idleSquareFloat {
      0% { opacity: 0; transform: translateY(8px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #team-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }

      .idle-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Connection indicator -->
  <div class="connection-dot" id="connection-dot"></div>
  <div class="connection-banner" id="connection-banner">Connecting to live feed...</div>

  <div class="title-area">
    <h1>Learnathon 2026 — Team Cards</h1>
    <div class="title-accent"></div>
    <div id="team-count"></div>
  </div>

  <div id="legends-section">
    <div id="legends-title">LEARNATHON LEGENDS</div>
    <div id="legends-list"></div>
  </div>

  <div id="team-grid"></div>

  <div id="idle">
    <div class="idle-title">Learnathon 2026</div>
    <div id="idle-url-label">Join at</div>
    <div id="idle-url"></div>
    <div class="idle-squares" id="idle-squares"></div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <script>
    const LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let prevTeams = {};
    let legends = new Set();
    let legendsShown = false;
    let squareDefs = [];

    // Show join URL
    document.getElementById('idle-url').textContent = window.location.origin + '/bingo/card.html';

    // Show idle initially
    document.getElementById('idle').classList.add('visible');
    document.getElementById('connection-banner').classList.add('visible');

    // --- Confetti ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const COLORS = ['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#fcd34d'];

    function launchConfetti() {
      const count = 120;
      for (let i = 0; i < count; i++) {
        const shape = Math.random();
        particles.push({
          x: Math.random() * canvas.width,
          y: -10,
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 3 + 2,
          rot: Math.random() * 360,
          rotV: (Math.random() - 0.5) * 8,
          w: Math.random() * 10 + 6,
          h: Math.random() * 5 + 3,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          life: 1,
          type: shape < 0.4 ? 'rect' : shape < 0.7 ? 'circle' : 'star',
        });
      }
      if (!animFrame) animateConfetti();
    }

    function drawStar(cx, cy, r, color) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](cx + r * Math.cos(angle), cy + r * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.rot += p.rotV;
        if (p.y > canvas.height + 20) p.life = 0;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.globalAlpha = Math.min(1, p.life);

        if (p.type === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        } else if (p.type === 'star') {
          drawStar(0, 0, p.w / 2, p.color);
        } else {
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }

        ctx.restore();
      });

      if (particles.length > 0) {
        animFrame = requestAnimationFrame(animateConfetti);
      } else {
        animFrame = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    // --- HTML escaping ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Idle square labels ---
    function showIdleSquareLabels(squares) {
      const container = document.getElementById('idle-squares');
      if (!squares || squares.length === 0) return;
      container.innerHTML = squares.map((sq, i) =>
        `<span class="idle-square-label" style="animation-delay:${(i * 0.6).toFixed(1)}s">${escapeHtml(sq.label)}</span>`
      ).join('');
    }

    // --- State rendering ---
    function getCompletedLines(squares) {
      return LINES.filter(line => line.every(i => squares[i]));
    }

    function applyState({ teams, squares: sqDefs }) {
      squareDefs = sqDefs;
      const teamList = Object.values(teams);

      // Show/hide idle
      const idle = document.getElementById('idle');
      if (teamList.length === 0) {
        idle.classList.add('visible');
        showIdleSquareLabels(sqDefs);
      } else {
        idle.classList.remove('visible');
      }

      // Team count badge
      const countEl = document.getElementById('team-count');
      if (teamList.length > 0) {
        countEl.textContent = `${teamList.length} team${teamList.length !== 1 ? 's' : ''} playing`;
        countEl.classList.add('visible');
      } else {
        countEl.classList.remove('visible');
      }

      // Detect new line completions and new legends
      let newLineDetected = false;
      teamList.forEach(team => {
        const prev = prevTeams[team.name];
        const prevLineCount = prev ? getCompletedLines(prev.squares).length : 0;
        const currLineCount = getCompletedLines(team.squares).length;

        if (currLineCount > prevLineCount) {
          newLineDetected = true;
          blinkTeamName(team.name);
        }

        if (team.isLegend && !legends.has(team.name)) {
          legends.add(team.name);
          launchConfetti();
          setTimeout(launchConfetti, 800);
        }
      });

      if (newLineDetected) launchConfetti();

      prevTeams = JSON.parse(JSON.stringify(teams));

      // Legends section
      const legendsSection = document.getElementById('legends-section');
      if (legends.size > 0) {
        if (!legendsShown) {
          legendsShown = true;
          legendsSection.style.display = 'block';
          void legendsSection.offsetWidth;
          legendsSection.style.animation = 'legendsEnter 0.5s ease forwards';
          legendsSection.classList.add('visible');
        }
        document.getElementById('legends-list').innerHTML =
          [...legends].map(name => `<div class="legend-badge">${escapeHtml(name)}</div>`).join('');
      }

      // Team grid
      const sorted = teamList.sort((a, b) => {
        if (a.isLegend !== b.isLegend) return b.isLegend - a.isLegend;
        const aLines = getCompletedLines(a.squares).length;
        const bLines = getCompletedLines(b.squares).length;
        if (aLines !== bLines) return bLines - aLines;
        return b.squares.filter(Boolean).length - a.squares.filter(Boolean).length;
      });

      document.getElementById('team-grid').innerHTML = sorted.map(team => {
        const completedLines = getCompletedLines(team.squares);
        const inLineSquares = new Set(completedLines.flat());

        const miniSquares = sqDefs.map((sq, i) => {
          const classes = [
            'mini-sq',
            sq.center ? 'center' : '',
            team.squares[i] ? 'marked' : '',
            inLineSquares.has(i) ? 'in-line' : '',
          ].filter(Boolean).join(' ');
          return `<div class="${classes}"></div>`;
        }).join('');

        const lineCount = completedLines.length;

        return `
          <div class="mini-card ${lineCount > 0 ? 'has-line' : ''} ${team.isLegend ? 'is-legend' : ''}"
               id="card-${CSS.escape(team.name)}">
            <div class="mini-card-name" id="name-${CSS.escape(team.name)}" title="${escapeHtml(team.name)}">
              ${team.isLegend ? '\ud83d\udd25 ' : ''}${escapeHtml(team.name)}
            </div>
            <div class="mini-grid">${miniSquares}</div>
            <div class="mini-lines ${lineCount > 0 ? 'has-line' : ''}">
              ${lineCount > 0 ? `${lineCount} line${lineCount > 1 ? 's' : ''}` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function blinkTeamName(name) {
      const el = document.getElementById(`name-${CSS.escape(name)}`);
      if (!el) return;
      el.classList.remove('blink');
      void el.offsetWidth;
      el.classList.add('blink');
    }

    // --- SSE ---
    const dot = document.getElementById('connection-dot');
    const banner = document.getElementById('connection-banner');
    const es = new EventSource('/bingo/events');

    es.onopen = () => {
      dot.classList.add('connected');
      banner.classList.remove('visible');
    };
    es.onmessage = e => {
      dot.classList.add('connected');
      banner.classList.remove('visible');
      applyState(JSON.parse(e.data));
    };
    es.onerror = () => {
      dot.classList.remove('connected');
      banner.classList.add('visible');
      console.warn('SSE reconnecting...');
    };
  </script>
</body>
</html>
