<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Learnathon Bingo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 1rem 2rem;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    header {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #777;
      margin-bottom: 1rem;
    }

    /* Mute toggle */
    .mute-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1e1e30;
      border: 1px solid #333;
      color: #888;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .mute-toggle:hover {
      border-color: #7c3aed;
      background: #1a1a2e;
    }

    /* Connection indicator */
    .connection-status {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0.3rem;
      background: #1a1520;
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 600;
      z-index: 70;
      display: none;
      animation: connectPulse 1.5s ease-in-out infinite;
    }

    .connection-status.visible { display: block; }

    @keyframes connectPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Team name modal */
    #join-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.70);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1.5rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .modal-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .modal-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .modal-box h2 { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .modal-box p  { color: #888; font-size: 0.9rem; margin-bottom: 1.25rem; }

    .modal-box input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #0f0f1a;
      border: 2px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1.15rem;
      text-align: center;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .modal-box input::placeholder { color: #555; }
    .modal-box input:focus { outline: none; border-color: #7c3aed; }

    .join-error {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-top: 0.75rem;
    }

    .join-error.visible { display: block; }

    /* Team header */
    #team-header {
      text-align: center;
      margin-bottom: 0.75rem;
    }

    #team-name-display {
      font-size: 1.4rem;
      font-weight: 800;
      color: #a78bfa;
    }

    /* Progress bar */
    #progress-area {
      width: 100%;
      max-width: 380px;
      margin-bottom: 1rem;
    }

    #progress-bar-track {
      width: 100%;
      height: 4px;
      background: #1e1e30;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.4rem;
    }

    #progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }

    #progress-line {
      font-size: 0.8rem;
      color: #999;
      text-align: center;
    }

    /* Legend banner - fixed at top */
    #legend-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #92400e, #d97706, #f59e0b, #d97706, #92400e);
      background-size: 300% 100%;
      padding: 0.75rem 1.25rem;
      text-align: center;
      font-weight: 800;
      font-size: 1.2rem;
      z-index: 50;
      animation: legendShimmer 3s ease infinite;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.6), 0 0 30px rgba(251, 191, 36, 0.3);
    }

    #legend-banner.visible {
      display: block;
    }

    @keyframes legendShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Legend overlay - full screen celebration */
    #legend-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
    }

    #legend-overlay.active { display: block; }

    #legend-overlay canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #legend-text-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 210;
      pointer-events: none;
    }

    #legend-text-overlay.active {
      display: flex;
      animation: legendTextIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes legendTextIn {
      0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      60% { opacity: 1; transform: scale(1.1) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .legend-title {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706, #f59e0b, #fbbf24);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: legendGold 2s linear infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.5));
    }

    @keyframes legendGold {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .legend-fire {
      font-size: 3.5rem;
      animation: fireFloat 1s ease-in-out infinite alternate;
    }

    @keyframes fireFloat {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-8px) scale(1.1); }
    }

    .legend-subtitle {
      font-size: 1rem;
      color: #fcd34d;
      margin-top: 0.5rem;
      font-weight: 600;
      opacity: 0;
      animation: legendSubIn 0.5s ease 1s forwards;
    }

    @keyframes legendSubIn {
      to { opacity: 1; }
    }

    /* Line toast */
    #line-toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, #92400e, #d97706);
      color: #fff;
      padding: 0.6rem 1.5rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      opacity: 0;
      pointer-events: none;
      z-index: 60;
      transition: opacity 0.3s, transform 0.3s;
    }

    #line-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Bingo grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      width: 100%;
      max-width: 380px;
    }

    .square {
      background: #1a1a2e;
      border: 2px solid #2a2a3e;
      border-radius: 12px;
      padding: 0.75rem 0.5rem;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.85rem;
      line-height: 1.35;
      color: #999;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    /* Loading spinner overlay for square */
    .square.loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 20, 0.5);
      z-index: 2;
    }

    .square.loading::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: #a78bfa;
      border-radius: 50%;
      z-index: 3;
      animation: squareSpin 0.6s linear infinite;
    }

    @keyframes squareSpin {
      to { transform: rotate(360deg); }
    }

    .square:active { transform: scale(0.96); }

    @media (hover: hover) {
      .square:not(.marked):hover {
        border-color: #444;
        background: #1e1e34;
      }
    }

    .square:not(.marked):active {
      border-color: #555;
    }

    .square.center {
      font-size: 0.82rem;
      font-weight: 700;
      color: #a78bfa;
      border: 2px solid transparent;
      background-image: linear-gradient(#1a1a2e, #1a1a2e), linear-gradient(135deg, #7c3aed, #a78bfa, #7c3aed);
      background-origin: border-box;
      background-clip: padding-box, border-box;
    }

    .square.marked {
      background: #1e1b4b;
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    .square.marked::after {
      content: '\2713';
      position: absolute;
      top: 5px;
      right: 8px;
      font-size: 0.65rem;
      color: #7c3aed;
      font-weight: 700;
      background: rgba(124, 58, 237, 0.15);
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .square.center.marked {
      background: #1c1917;
      border: 2px solid #d97706;
      background-image: none;
      color: #fcd34d;
    }

    .square.center.marked::after {
      color: #d97706;
      background: rgba(217, 119, 6, 0.15);
    }

    /* Loading state overrides the checkmark */
    .square.loading::after {
      content: '';
      top: auto;
      right: auto;
      font-size: 0;
      background: transparent;
    }

    .square.in-line {
      background: #1c1917;
      border-color: #d97706;
      background-image: none;
      color: #fcd34d;
      animation: lineGlow 1s ease-in-out 4;
    }

    @keyframes lineGlow {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 20px #d97706, 0 0 40px #d97706aa, 0 0 60px #d9770644; }
    }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.98); }

    .square-label {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    /* Mobile touch target fix */
    @media (max-width: 768px) {
      .square {
        min-height: 80px;
        min-width: 44px;
        padding: 0.5rem 0.35rem;
      }

      #grid {
        gap: 0.4rem;
      }
    }
  </style>
</head>
<body>

  <header>Learnathon 2026</header>

  <!-- Connection status -->
  <div class="connection-status" id="connection-status">Connecting...</div>

  <!-- Mute toggle -->
  <button class="mute-toggle" id="mute-toggle" onclick="toggleMute()" title="Toggle sound effects">🔊</button>

  <!-- Line completion toast -->
  <div id="line-toast">Line completed!</div>

  <!-- Join modal -->
  <div id="join-modal">
    <div class="modal-box">
      <div class="modal-emoji">🎯</div>
      <h2>Join the Bingo</h2>
      <p>Enter your team name to get your card.</p>
      <input type="text" id="name-input" placeholder="e.g. Team Rocket" maxlength="40" autocomplete="off" />
      <button class="btn-primary" onclick="join()">Get my card</button>
      <div class="join-error" id="join-error"></div>
    </div>
  </div>

  <!-- Legend banner (fixed top) -->
  <div id="legend-banner">🔥 LEARNATHON LEGEND 🔥</div>

  <!-- Legend celebration overlay -->
  <div id="legend-overlay">
    <canvas id="legend-confetti"></canvas>
  </div>
  <div id="legend-text-overlay">
    <div class="legend-fire">🔥🔥🔥</div>
    <div class="legend-title">LEGEND</div>
    <div class="legend-fire">🔥🔥🔥</div>
    <div class="legend-subtitle">You completed every single square!</div>
  </div>

  <!-- Card -->
  <div id="team-header">
    <div id="team-name-display"></div>
  </div>

  <div id="progress-area">
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>
    <div id="progress-line"></div>
  </div>

  <div id="grid"></div>

  <script>
    const LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let teamName = localStorage.getItem('learnathon-bingo-team') || '';
    let squares = new Array(9).fill(false);
    let serverSquares = [];
    let prevLineCount = 0;
    let loadingSquares = new Set();

    // --- Web Audio API sound effects ---
    let audioCtx = null;
    let soundMuted = localStorage.getItem('learnathon-bingo-muted') === 'true';

    // Pentatonic scale frequencies: C4, D4, E4, G4, A4
    const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00];

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playMarkSound() {
      if (soundMuted) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      } catch (e) { /* ignore audio errors */ }
    }

    function playLineSound() {
      if (soundMuted) return;
      try {
        const ctx = getAudioCtx();
        // Ascending arpeggio: C4 -> E4 -> G4
        const notes = [261.63, 329.63, 392.00];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const startTime = ctx.currentTime + i * 0.12;
          gain.gain.setValueAtTime(0.12, startTime);
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startTime);
          osc.stop(startTime + 0.25);
        });
      } catch (e) { /* ignore audio errors */ }
    }

    function playLegendSound() {
      if (soundMuted) return;
      try {
        const ctx = getAudioCtx();
        // Warm chord: C4 + E4 + G4 together
        const chord = [261.63, 329.63, 392.00];
        chord.forEach(freq => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.8);
        });
      } catch (e) { /* ignore audio errors */ }
    }

    function toggleMute() {
      soundMuted = !soundMuted;
      localStorage.setItem('learnathon-bingo-muted', soundMuted);
      document.getElementById('mute-toggle').textContent = soundMuted ? '🔇' : '🔊';
      // Initialize audio context on user gesture
      if (!soundMuted) getAudioCtx();
    }

    // Set initial mute button state
    document.getElementById('mute-toggle').textContent = soundMuted ? '🔇' : '🔊';

    // --- Connection status ---
    const connStatus = document.getElementById('connection-status');

    function join() {
      const input = document.getElementById('name-input').value.trim();
      if (!input) return;

      fetch('/bingo/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: input }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            showError(data.error);
            return;
          }
          teamName = input;
          localStorage.setItem('learnathon-bingo-team', teamName);
          squares = data.team.squares;
          prevLineCount = getCompletedLines().length;
          document.getElementById('join-modal').style.display = 'none';
          connectSSE();
          render();
        });
    }

    function showError(msg) {
      const el = document.getElementById('join-error');
      el.textContent = msg;
      el.classList.add('visible');
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') join();
    });

    document.getElementById('name-input').addEventListener('input', () => {
      document.getElementById('join-error').classList.remove('visible');
    });

    function toggleSquare(index) {
      if (loadingSquares.has(index)) return;
      const newVal = !squares[index];
      loadingSquares.add(index);
      renderSquareLoading(index, true);

      fetch('/bingo/mark', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: teamName, square: index, marked: newVal }),
      })
        .then(r => r.json())
        .then(data => {
          loadingSquares.delete(index);
          if (data.error) { alert(data.error); render(); return; }
          squares[index] = newVal;
          if (newVal) playMarkSound();
          if (data.newLine) {
            celebrateLine();
            playLineSound();
          }
          if (data.newLegend) {
            celebrateLegend();
            playLegendSound();
          }
          render();
        })
        .catch(() => {
          loadingSquares.delete(index);
          render();
        });
    }

    function renderSquareLoading(index, loading) {
      const gridEl = document.getElementById('grid');
      const squareEl = gridEl.children[index];
      if (squareEl) {
        squareEl.classList.toggle('loading', loading);
      }
    }

    function getCompletedLines() {
      return LINES.filter(line => line.every(i => squares[i]));
    }

    function render() {
      if (!teamName || !serverSquares.length) return;

      document.getElementById('team-name-display').textContent = teamName;

      const completedLines = getCompletedLines();
      const inLineSquares = new Set(completedLines.flat());
      const marked = squares.filter(Boolean).length;

      document.getElementById('progress-bar-fill').style.width = `${(marked / 9) * 100}%`;
      document.getElementById('progress-line').textContent =
        `${marked}/9 squares \u00b7 ${completedLines.length} line${completedLines.length !== 1 ? 's' : ''}`;

      const legendBanner = document.getElementById('legend-banner');
      if (squares.every(Boolean)) {
        legendBanner.classList.add('visible');
        document.body.style.paddingTop = '4rem';
      } else {
        legendBanner.classList.remove('visible');
        document.body.style.paddingTop = '';
      }

      document.getElementById('grid').innerHTML = serverSquares.map((sq, i) => {
        const isMarked = squares[i];
        const inLine = inLineSquares.has(i);
        const isLoading = loadingSquares.has(i);
        const classes = [
          'square',
          sq.center ? 'center' : '',
          isMarked ? 'marked' : '',
          inLine ? 'in-line' : '',
          isLoading ? 'loading' : '',
        ].filter(Boolean).join(' ');

        return `<div class="${classes}" onclick="toggleSquare(${i})"><span class="square-label">${sq.label}</span></div>`;
      }).join('');
    }

    function celebrateLine() {
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      showLineToast();
      showLineConfetti();
    }

    function showLineToast() {
      const toast = document.getElementById('line-toast');
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    function showLineConfetti() {
      const overlay = document.getElementById('legend-overlay');
      overlay.classList.add('active');
      const canvas = document.getElementById('legend-confetti');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');

      const COLORS = ['#d97706', '#f59e0b', '#fbbf24', '#7c3aed', '#a78bfa'];
      const particles = [];

      // 80 confetti particles from top
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -Math.random() * 100,
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 3 + 1.5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          size: Math.random() * 6 + 3,
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 8,
          shape: Math.random() > 0.4 ? 'rect' : 'circle',
          life: 1,
          decay: 0.006 + Math.random() * 0.004,
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          if (p.life <= 0) return;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.06;
          p.rotation += p.rotSpeed;
          p.life -= p.decay;
          ctx.save();
          ctx.globalAlpha = Math.min(p.life, 1);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          if (p.shape === 'rect') {
            ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        });
        if (alive) {
          requestAnimationFrame(animate);
        } else {
          overlay.classList.remove('active');
        }
      }
      requestAnimationFrame(animate);
    }

    function celebrateLegend() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400, 200, 600]);

      // Show text overlay
      const textOverlay = document.getElementById('legend-text-overlay');
      textOverlay.classList.add('active');

      // Show confetti overlay
      const overlay = document.getElementById('legend-overlay');
      overlay.classList.add('active');

      // Run confetti
      const canvas = document.getElementById('legend-confetti');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');

      const particles = [];
      const COLORS = ['#fbbf24', '#f59e0b', '#d97706', '#7c3aed', '#a78bfa', '#ef4444', '#22c55e', '#3b82f6', '#ec4899'];
      const FIRE_EMOJIS = ['🔥', '🔥', '🔥', '✨', '⭐', '🎉', '🏆', '💥'];

      // Create 200 confetti particles
      for (let i = 0; i < 200; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          vx: (Math.random() - 0.5) * 6,
          vy: Math.random() * 4 + 2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          size: Math.random() * 8 + 4,
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10,
          shape: Math.random() > 0.3 ? 'rect' : 'circle',
          life: 1,
          decay: 0.002 + Math.random() * 0.002,
        });
      }

      // Create floating fire emojis
      const fireEmojis = [];
      for (let i = 0; i < 25; i++) {
        fireEmojis.push({
          x: Math.random() * canvas.width,
          y: canvas.height + Math.random() * 200,
          vy: -(Math.random() * 3 + 1.5),
          vx: (Math.random() - 0.5) * 1.5,
          emoji: FIRE_EMOJIS[Math.floor(Math.random() * FIRE_EMOJIS.length)],
          size: Math.random() * 24 + 20,
          life: 1,
          decay: 0.003 + Math.random() * 0.003,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.02 + Math.random() * 0.03,
        });
      }

      let frame = 0;
      function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;

        // Draw confetti
        particles.forEach(p => {
          if (p.life <= 0) return;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rotation += p.rotSpeed;
          p.life -= p.decay;

          ctx.save();
          ctx.globalAlpha = Math.min(p.life, 1);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          if (p.shape === 'rect') {
            ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        });

        // Draw fire emojis floating up
        fireEmojis.forEach(f => {
          if (f.life <= 0) return;
          alive = true;
          f.y += f.vy;
          f.x += f.vx + Math.sin(f.wobble) * 0.5;
          f.wobble += f.wobbleSpeed;
          f.life -= f.decay;

          ctx.save();
          ctx.globalAlpha = Math.min(f.life * 1.5, 1);
          ctx.font = `${f.size}px serif`;
          ctx.textAlign = 'center';
          ctx.fillText(f.emoji, f.x, f.y);
          ctx.restore();
        });

        frame++;

        // Second burst at frame 60
        if (frame === 60) {
          for (let i = 0; i < 100; i++) {
            particles.push({
              x: canvas.width / 2 + (Math.random() - 0.5) * 200,
              y: canvas.height / 2,
              vx: (Math.random() - 0.5) * 12,
              vy: (Math.random() - 0.5) * 12,
              color: COLORS[Math.floor(Math.random() * COLORS.length)],
              size: Math.random() * 10 + 3,
              rotation: Math.random() * 360,
              rotSpeed: (Math.random() - 0.5) * 15,
              shape: Math.random() > 0.5 ? 'rect' : 'circle',
              life: 1,
              decay: 0.005 + Math.random() * 0.005,
            });
          }
          for (let i = 0; i < 15; i++) {
            fireEmojis.push({
              x: canvas.width / 2 + (Math.random() - 0.5) * 300,
              y: canvas.height / 2,
              vy: -(Math.random() * 4 + 2),
              vx: (Math.random() - 0.5) * 4,
              emoji: FIRE_EMOJIS[Math.floor(Math.random() * FIRE_EMOJIS.length)],
              size: Math.random() * 30 + 24,
              life: 1,
              decay: 0.004 + Math.random() * 0.004,
              wobble: Math.random() * Math.PI * 2,
              wobbleSpeed: 0.03,
            });
          }
        }

        if (alive) {
          requestAnimationFrame(animateConfetti);
        } else {
          overlay.classList.remove('active');
        }
      }

      requestAnimationFrame(animateConfetti);

      // Fade out text overlay after 5 seconds
      setTimeout(() => {
        textOverlay.style.transition = 'opacity 1s ease';
        textOverlay.style.opacity = '0';
        setTimeout(() => {
          textOverlay.classList.remove('active');
          textOverlay.style.opacity = '';
          textOverlay.style.transition = '';
        }, 1000);
      }, 5000);
    }

    function connectSSE() {
      connStatus.classList.add('visible');
      const es = new EventSource('/bingo/events');
      es.onopen = () => {
        connStatus.classList.remove('visible');
      };
      es.onmessage = e => {
        connStatus.classList.remove('visible');
        const data = JSON.parse(e.data);
        serverSquares = data.squares;
        if (data.teams[teamName]) {
          squares = data.teams[teamName].squares;
        }
        render();
      };
      es.onerror = () => {
        connStatus.classList.add('visible');
        connStatus.textContent = 'Reconnecting...';
      };
    }

    // Auto-rejoin if name is stored
    if (teamName) {
      fetch('/bingo/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: teamName }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            squares = data.team.squares;
            prevLineCount = getCompletedLines().length;
            document.getElementById('join-modal').style.display = 'none';
            connectSSE();
          }
        });
    }
  </script>
</body>
