<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Learnathon 2026 — Vote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100dvh;
      padding: 1.25rem 1rem 3rem;
    }

    header {
      text-align: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 0.5rem;
    }

    #progress {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    #progress strong { color: #a78bfa; }

    #all-done {
      display: none;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    #all-done .icon { font-size: 2.5rem; display: block; }
    #all-done p { color: #4ade80; font-weight: 700; font-size: 1.1rem; margin-top: 0.5rem; }
    #all-done small { color: #555; font-size: 0.85rem; }

    /* Status banner */
    #status-banner {
      text-align: center;
      font-size: 1rem;
      padding: 0.75rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    #status-banner.open {
      background: #14532d;
      border: 1px solid #15803d;
      color: #4ade80;
    }

    #status-banner.closed {
      background: #1c1917;
      border: 1px solid #44403c;
      color: #a8a29e;
    }

    /* Category section */
    .category-section {
      margin-bottom: 1.5rem;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .cat-emoji { font-size: 1.3rem; }

    .cat-label {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .cat-voted {
      margin-left: auto;
      font-size: 0.75rem;
      color: #4ade80;
      font-weight: 700;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem;
    }

    .team-btn {
      background: #1a1a2e;
      border: 2px solid #2a2a3e;
      color: #ccc;
      padding: 0.55rem 0.4rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s ease;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-btn:active { transform: scale(0.97); }
    .team-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .team-btn.selected {
      background: #1e1b4b;
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e1e30;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <header>🎓 Learnathon 2026 — Awards</header>
  <div id="progress"></div>
  <div id="all-done">
    <span class="icon">✅</span>
    <p>All votes cast!</p>
    <small>Watch the big screen for results.</small>
  </div>
  <div id="status-banner"></div>
  <div id="categories"></div>

  <script>
    let myVotes = JSON.parse(localStorage.getItem('learnathon-votes') || '{}');

    function saveMyVotes() {
      localStorage.setItem('learnathon-votes', JSON.stringify(myVotes));
    }

    function vote(categoryId, team) {
      fetch('/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ team, category: categoryId }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            myVotes[categoryId] = team;
            saveMyVotes();
            // re-render from current state
            fetch('/state').then(r => r.json()).then(render);
          } else {
            alert(data.error || 'Vote failed');
          }
        });
    }

    function render(state) {
      const banner = document.getElementById('status-banner');
      const catsEl = document.getElementById('categories');
      const progressEl = document.getElementById('progress');
      const doneEl = document.getElementById('all-done');

      if (!state.votingOpen && state.revealedUpTo < 0) {
        banner.className = 'closed';
        banner.textContent = '⏳ Voting hasn\'t opened yet — hang tight!';
        catsEl.innerHTML = '';
        progressEl.textContent = '';
        doneEl.style.display = 'none';
        return;
      }

      if (!state.votingOpen && state.revealedUpTo >= 0) {
        banner.className = 'closed';
        banner.textContent = '🎉 Voting closed — watch the screen for reveals!';
        catsEl.innerHTML = '';
        progressEl.textContent = '';
        doneEl.style.display = 'none';
        return;
      }

      // Voting is open — show all categories
      banner.className = 'open';
      banner.textContent = '● Voting is open — one team per category';

      const votedCount = state.categories.filter(c => myVotes[c.id]).length;
      const total = state.categories.length;

      if (votedCount >= total) {
        progressEl.textContent = '';
        doneEl.style.display = 'block';
      } else {
        progressEl.innerHTML = `<strong>${votedCount}</strong> of <strong>${total}</strong> categories voted`;
        doneEl.style.display = 'none';
      }

      catsEl.innerHTML = state.categories.map((cat, i) => {
        const selected = myVotes[cat.id];
        const teamButtons = state.teams.map(team => {
          const isSelected = selected === team;
          return `<button class="team-btn ${isSelected ? 'selected' : ''}"
            onclick="vote('${cat.id}', '${team.replace(/'/g, "\\'")}')"
            ${!state.votingOpen ? 'disabled' : ''}>${team}</button>`;
        }).join('');

        return `
          <div class="category-section">
            <div class="cat-header">
              <span class="cat-emoji">${cat.emoji}</span>
              <span class="cat-label">${cat.label}</span>
              ${selected ? `<span class="cat-voted">✓ ${selected}</span>` : ''}
            </div>
            <div class="team-grid">${teamButtons}</div>
          </div>
          ${i < state.categories.length - 1 ? '<hr class="divider">' : ''}
        `;
      }).join('');
    }

    // SSE
    const es = new EventSource('/events');
    es.onmessage = e => render(JSON.parse(e.data));
    es.onerror = () => console.warn('SSE reconnecting...');
  </script>
</body>
</html>
