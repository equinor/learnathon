<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026 — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 1.5rem; }

    /* Login */
    #login-screen { max-width: 360px; margin: 10vh auto; text-align: center; }
    #login-screen input {
      width: 100%; padding: 0.75rem 1rem; background: #1a1a2e;
      border: 1px solid #333; border-radius: 8px; color: #fff;
      font-size: 1rem; margin: 1rem 0;
    }
    #login-screen button { width: 100%; }

    /* App */
    #app { display: none; max-width: 800px; }

    .card {
      background: #1a1a2e; border: 1px solid #2a2a3e;
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem;
    }
    .card h2 {
      font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: #555; margin-bottom: 1rem;
    }

    button {
      padding: 0.6rem 1.25rem; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-green   { background: #16a34a; color: #fff; }
    .btn-red     { background: #dc2626; color: #fff; }
    .btn-amber   { background: #d97706; color: #fff; }
    .btn-ghost   { background: #2a2a3e; color: #ccc; }
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    textarea {
      width: 100%; background: #0f0f1a; border: 1px solid #333;
      border-radius: 8px; color: #fff; padding: 0.75rem;
      font-size: 0.9rem; resize: vertical; min-height: 120px; font-family: inherit;
    }

    /* Guidance banner */
    #guidance {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.1rem; border-radius: 12px; margin-bottom: 1.25rem;
      font-size: 0.95rem; font-weight: 600; border: 1px solid transparent;
    }
    #guidance.step-setup  { background: #1c1917; border-color: #44403c; color: #d6d3d1; }
    #guidance.step-ready  { background: #1e1b4b; border-color: #4338ca; color: #c7d2fe; }
    #guidance.step-open   { background: #14532d; border-color: #15803d; color: #86efac; }
    #guidance.step-close  { background: #1c1917; border-color: #b45309; color: #fcd34d; }
    #guidance.step-reveal { background: #2e1065; border-color: #7c3aed; color: #e9d5ff; }
    #guidance.step-done   { background: #14532d; border-color: #15803d; color: #86efac; }
    #guidance-icon { font-size: 1.3rem; flex-shrink: 0; }

    /* Vote URL bar */
    #vote-url-bar {
      display: none; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1rem; background: #14532d; border: 1px solid #15803d;
      border-radius: 10px; margin-bottom: 1.25rem; font-size: 0.85rem; color: #86efac;
    }
    #vote-url-bar span { font-weight: 700; font-family: monospace; font-size: 0.9rem; }

    /* Category list */
    .cat-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0; border-bottom: 1px solid #1e1e30;
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-emoji { font-size: 1.2rem; width: 2rem; text-align: center; }
    .cat-name  { flex: 1; font-size: 0.95rem; }
    .cat-state { font-size: 0.75rem; color: #555; }
    .cat-state.revealed { color: #4ade80; font-weight: 700; }
    .cat-state.next     { color: #fbbf24; font-weight: 700; }

    /* Vote totals */
    .cat-votes { font-size: 0.75rem; color: #555; width: 60px; text-align: right; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.4rem 0.5rem; border-bottom: 1px solid #2a2a3e; }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #1a1a2e; }
    tr.winner td { color: #fbbf24; font-weight: 700; }

    .tie-alert {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 1rem; background: #2d1a00; border: 2px solid #d97706;
      border-radius: 10px; margin-top: 0.75rem;
      font-size: 0.9rem; color: #fbbf24; font-weight: 600;
      animation: tiePulse 1.5s infinite;
    }
    @keyframes tiePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #4ade80; color: #000; padding: 0.6rem 1.25rem; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; display: none;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>🎓 Learnathon Admin</h1>
    <input type="password" id="token-input" placeholder="Admin token" />
    <button class="btn-primary" onclick="login()">Sign in</button>
    <p id="login-error" style="color:#ef4444;margin-top:0.5rem;font-size:0.85rem;"></p>
  </div>

  <!-- App -->
  <div id="app">
    <h1>🎓 Learnathon 2026 — Admin</h1>
    <p class="subtitle">Facilitator control panel — vote once, reveal one by one</p>

    <div id="guidance">
      <span id="guidance-icon"></span>
      <span id="guidance-text"></span>
    </div>

    <div id="vote-url-bar">
      📱 Tell participants to open: <span id="vote-url"></span>
    </div>

    <!-- Flow controls -->
    <div class="card">
      <h2>Ceremony Controls</h2>
      <div class="btn-row">
        <button class="btn-green" id="btn-open" onclick="api('admin/open')">
          🗳️ Open Voting
        </button>
        <button class="btn-ghost" id="btn-close" onclick="api('admin/close')">
          🔒 Close Voting
        </button>
        <button class="btn-amber" id="btn-reveal" onclick="api('admin/reveal-next')">
          ✨ Reveal Next
        </button>
        <button class="btn-red" onclick="confirmReset()">
          ↺ Reset All
        </button>
      </div>
    </div>

    <!-- Categories overview -->
    <div class="card">
      <h2>Reveal Order</h2>
      <div id="cat-list"></div>
    </div>

    <!-- Vote counts for current revealed category -->
    <div class="card" id="vote-detail-card" style="display:none;">
      <h2 id="vote-detail-title">Votes</h2>
      <div id="vote-table"></div>
    </div>

    <!-- Team setup -->
    <div class="card">
      <h2>Team Setup</h2>
      <p style="color:#666;font-size:0.85rem;margin-bottom:0.75rem;">
        One team name per line. Do this before the ceremony starts.
      </p>
      <textarea id="teams-input" placeholder="Team Rocket&#10;Team Copilot&#10;Team Vibe&#10;..."></textarea>
      <div style="margin-top:0.75rem;">
        <button class="btn-primary" onclick="saveTeams()">Save Teams</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let adminToken = '';

    function login() {
      adminToken = document.getElementById('token-input').value.trim();
      fetch('/state', { headers: { 'x-admin-token': adminToken } })
        .then(r => { if (r.status === 401) throw new Error(); return r.json(); })
        .then(() => {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          connectSSE();
        })
        .catch(() => {
          document.getElementById('login-error').textContent = 'Wrong token';
        });
    }

    document.getElementById('token-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function api(endpoint) {
      return fetch(`/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
        body: '{}',
      }).then(r => r.json()).then(data => {
        if (data.error) showToast('❌ ' + data.error, '#ef4444');
      });
    }

    function saveTeams() {
      const raw = document.getElementById('teams-input').value;
      const teams = raw.split('\n').map(t => t.trim()).filter(Boolean);
      fetch('/admin/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
        body: JSON.stringify({ teams }),
      }).then(r => r.json()).then(data => {
        if (data.ok) showToast('✓ ' + data.teams.length + ' teams saved');
        else showToast('❌ ' + data.error, '#ef4444');
      });
    }

    function confirmReset() {
      if (confirm('Reset all votes and reveals?')) api('admin/reset');
    }

    function showToast(msg, bg = '#4ade80') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.background = bg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    function applyState(state) {
      const allRevealed = state.revealedUpTo >= state.categories.length - 1;

      // --- Guidance ---
      const g = document.getElementById('guidance');
      const icon = document.getElementById('guidance-icon');
      const text = document.getElementById('guidance-text');

      if (!state.teams.length) {
        g.className = 'step-setup';
        icon.textContent = '①';
        text.textContent = 'Enter team names below and click Save Teams.';
      } else if (!state.votingOpen && state.revealedUpTo < 0 && !Object.keys(state.votes).length) {
        g.className = 'step-ready';
        icon.textContent = '②';
        text.textContent = 'Ready! Click 🗳️ Open Voting — participants vote on all 6 categories at once.';
      } else if (state.votingOpen) {
        g.className = 'step-open';
        icon.textContent = '③';
        text.textContent = 'Voting is live. Give them 2–3 minutes. Click 🔒 Close Voting when done.';
      } else if (state.revealedUpTo < 0) {
        g.className = 'step-close';
        icon.textContent = '④';
        const nextCat = state.categories[0];
        text.textContent = `Voting closed. Build suspense... then click ✨ Reveal Next for ${nextCat.emoji} ${nextCat.label}.`;
      } else if (!allRevealed) {
        g.className = 'step-reveal';
        icon.textContent = '✨';
        const nextCat = state.categories[state.revealedUpTo + 1];
        text.textContent = `Announce the winner. Then click ✨ Reveal Next for ${nextCat.emoji} ${nextCat.label}.`;
      } else {
        g.className = 'step-done';
        icon.textContent = '🎉';
        text.textContent = 'All 6 categories revealed! Announce the winners and hand out stickers.';
      }

      // --- Vote URL bar ---
      const urlBar = document.getElementById('vote-url-bar');
      if (state.votingOpen) {
        urlBar.style.display = 'flex';
        document.getElementById('vote-url').textContent = window.location.origin + '/vote.html';
      } else {
        urlBar.style.display = 'none';
      }

      // --- Buttons ---
      document.getElementById('btn-open').disabled = !state.teams.length || state.votingOpen || state.revealedUpTo >= 0;
      document.getElementById('btn-close').disabled = !state.votingOpen;
      document.getElementById('btn-reveal').disabled = state.votingOpen || allRevealed || (state.revealedUpTo < 0 && !Object.keys(state.votes).length);

      // --- Category list ---
      document.getElementById('cat-list').innerHTML = state.categories.map((cat, i) => {
        const isRevealed = i <= state.revealedUpTo;
        const isNext = i === state.revealedUpTo + 1 && !state.votingOpen && state.revealedUpTo >= 0;
        const catVotes = state.votes[cat.id] || {};
        const total = Object.values(catVotes).reduce((a, b) => a + b, 0);

        return `
          <div class="cat-item">
            <div class="cat-emoji">${cat.emoji}</div>
            <div class="cat-name">${cat.label}</div>
            <div class="cat-votes">${total > 0 ? total + ' votes' : ''}</div>
            <div class="cat-state ${isRevealed ? 'revealed' : ''} ${isNext ? 'next' : ''}">
              ${isRevealed ? '✓ Revealed' : isNext ? '▶ Next' : ''}
            </div>
          </div>
        `;
      }).join('');

      // --- Vote detail for most recently revealed category ---
      const detailCard = document.getElementById('vote-detail-card');
      if (state.revealedUpTo >= 0) {
        const cat = state.categories[state.revealedUpTo];
        const catVotes = state.votes[cat.id] || {};
        const rows = state.teams
          .map(team => ({ team, count: catVotes[team] || 0 }))
          .sort((a, b) => b.count - a.count);
        const maxCount = rows[0]?.count || 0;

        detailCard.style.display = 'block';
        document.getElementById('vote-detail-title').textContent = `${cat.emoji} ${cat.label} — Results`;
        const isTie = rows.length >= 2 && maxCount > 0 && rows[0].count === rows[1].count;
        document.getElementById('vote-table').innerHTML = `
          <table>
            <thead><tr><th>Team</th><th>Votes</th></tr></thead>
            <tbody>
              ${rows.map(r => `
                <tr class="${r.count > 0 && r.count === maxCount ? 'winner' : ''}">
                  <td>${r.team}</td><td>${r.count}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${isTie ? '<div class="tie-alert">⚖️ Tie! Check bingo card progress to decide the winner.</div>' : ''}
        `;
      } else {
        detailCard.style.display = 'none';
      }

      // Sync teams textarea if empty
      const teamsInput = document.getElementById('teams-input');
      if (!teamsInput.value && state.teams.length > 0) {
        teamsInput.value = state.teams.join('\n');
      }
    }

    function connectSSE() {
      const es = new EventSource('/events');
      es.onmessage = e => applyState(JSON.parse(e.data));
    }
  </script>
</body>
</html>
