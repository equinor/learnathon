<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnathon 2026 — Screen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Waiting / Intro screen */
    #idle-screen {
      text-align: center;
    }

    #idle-screen .logo {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    #idle-screen h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #idle-screen p {
      color: #555;
      font-size: 1.4rem;
      margin-top: 1rem;
    }

    /* Category reveal */
    #category-screen {
      display: none;
      text-align: center;
      width: 100%;
      padding: 2rem;
    }

    #cat-emoji {
      font-size: 6rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    #cat-label {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    #voting-indicator {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      font-weight: 600;
      color: #555;
    }

    #voting-indicator.open {
      color: #4ade80;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Results */
    #results {
      display: none;
      width: 100%;
      max-width: 900px;
      padding: 1rem 2rem;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .result-team {
      font-size: 1.6rem;
      font-weight: 700;
      width: 200px;
      flex-shrink: 0;
      text-align: right;
    }

    .result-bar-wrap {
      flex: 1;
      background: #1a1a2e;
      border-radius: 8px;
      height: 52px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 8px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
    }

    .result-bar.winner {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
    }

    .result-count {
      font-size: 1.6rem;
      font-weight: 800;
      width: 50px;
      flex-shrink: 0;
      color: #a78bfa;
    }

    .result-row.winner .result-team {
      color: #fbbf24;
    }

    .result-row.winner .result-count {
      color: #fbbf24;
    }

    /* Vote count badge (while voting open) */
    #total-votes {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #555;
    }

    /* URL hint */
    #url-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      font-weight: 700;
      color: #4ade80;
      background: #0a1f0a;
      border: 1px solid #15803d;
      padding: 0.5rem 1.5rem;
      border-radius: 12px;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="idle-screen">
    <div class="logo">🎓</div>
    <h1>Learnathon 2026</h1>
    <p>Awards ceremony starting soon...</p>
  </div>

  <div id="category-screen">
    <span id="cat-emoji"></span>
    <div id="cat-label"></div>
    <div id="voting-indicator"></div>
    <div id="total-votes"></div>
  </div>

  <div id="results"></div>

  <div id="url-hint"></div>

  <script>
    function applyState(state) {
      const idleEl = document.getElementById('idle-screen');
      const catEl = document.getElementById('category-screen');
      const resultsEl = document.getElementById('results');

      if (state.currentCategoryIndex < 0) {
        idleEl.style.display = 'block';
        catEl.style.display = 'none';
        resultsEl.style.display = 'none';
        return;
      }

      idleEl.style.display = 'none';

      const cat = state.categories[state.currentCategoryIndex];
      const catVotes = state.votes[cat.id] || {};
      const totalVotes = Object.values(catVotes).reduce((a, b) => a + b, 0);

      document.getElementById('cat-emoji').textContent = cat.emoji;
      document.getElementById('cat-label').textContent = cat.label;

      const indicator = document.getElementById('voting-indicator');
      if (state.votingOpen) {
        indicator.textContent = '● Voting is open';
        indicator.className = 'open';
      } else {
        indicator.textContent = state.revealed ? '' : '○ Voting is closed';
        indicator.className = '';
      }

      document.getElementById('total-votes').textContent =
        totalVotes > 0 && !state.revealed ? `${totalVotes} vote${totalVotes !== 1 ? 's' : ''} cast` : '';

      if (state.revealed && state.teams.length > 0) {
        catEl.style.display = 'block';
        document.getElementById('voting-indicator').textContent = '';
        document.getElementById('total-votes').textContent = '';

        resultsEl.style.display = 'block';

        // Sort teams by votes descending
        const sorted = state.teams
          .map(team => ({ team, count: catVotes[team] || 0 }))
          .sort((a, b) => b.count - a.count);

        const maxVotes = sorted[0]?.count || 1;

        resultsEl.innerHTML = sorted.map((item, i) => `
          <div class="result-row ${i === 0 && item.count > 0 ? 'winner' : ''}">
            <div class="result-team">${item.team}</div>
            <div class="result-bar-wrap">
              <div class="result-bar ${i === 0 && item.count > 0 ? 'winner' : ''}"
                style="width: ${item.count === 0 ? '0' : Math.max(4, (item.count / maxVotes) * 100)}%">
              </div>
            </div>
            <div class="result-count">${item.count}</div>
          </div>
        `).join('');
      } else {
        catEl.style.display = 'block';
        resultsEl.style.display = 'none';
        resultsEl.innerHTML = '';
      }

      // Show vote URL when voting is open
      document.getElementById('url-hint').textContent =
        state.votingOpen ? `📱 ${window.location.origin}/vote.html` : '';
    }

    const es = new EventSource('/events');
    es.onmessage = e => applyState(JSON.parse(e.data));
    es.onerror = () => console.warn('SSE disconnected');
  </script>
</body>
</html>
